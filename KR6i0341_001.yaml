body:
  text: 一切佛語心品第一五法自性識二種無我究竟通達名相妄想正智如如曰五法妄想緣起成自性曰三自性識即八識是也二種無我即人法是也楞伽以佛語心為宗無門為法門所以成之者在此諸佛心第一此心如樹木堅實心非念慮心也常句非常句凡有三常此常梵音與上常音異也數句非數句此物之數也數句非數句此數霜縷切大慧是百八句先佛所説汝及諸菩薩應當修學指明真相分第一爾時大慧菩薩復白佛言世尊諸識有幾種生住滅佛告大慧諸識有二種生住滅非思量所知唯般若智乃能照觀諸識有二種生謂流注生謂心念緣生如水流注及相生謂覩一切色相而生有二種住謂流注住及相住有二種滅謂流注滅及相滅大慧諸識有三種相謂轉相業相真相真相即常住真心也下文自真相實不滅者是也業相謂真相為無明所覆業所由生故曰業相轉相謂無明覆故本來不動者今轉而受染故曰轉相大慧略説有三種識廣説有八相八相即八識也何等為三謂真識現識及分別事識如如實相逈離塵妄故曰真識能受所現之色故曰現識即諸經之第八識亦謂之藏識也色為所現識為能現以其如鏡現像故曰現識分別事識即諸經第六意識是也譬如明鏡持諸色像現識處現亦復如是現識及分別事識此二壞不壞相展轉因壞者分別識也所謂分別已則壞不壞者現識也謂所現雖滅而能現者常存二者互相因故曰展轉因不思議薰及不思議變是現識因取種種塵及無始妄想薰是分別事識因本來無諸識相從無始冥薰及種種變異故有現識攬取諸塵及為妄想所薰故有分別事識大慧若覆彼真識種種不實諸虗妄滅則一切根識滅是名相滅覆有反復之義謂回光返照還於真識則一切根塵泯為法界所有性相復何覩哉大慧相續滅者相續所因滅則相續滅所從滅及所緣滅則相續滅所以者何是其所依故依者謂無始妄想薰緣者謂自心見等識境妄想所從所緣所依皆虗妄相續之因惟滅其因則相續滅矣一心真相本自廓然逈脫根塵復何所依心不自心復何所緣蓋為膠於薰習未免依他雖悟本心已獲明了緣立心相續妄不休唯是續病併除方即如如妙地如來續滅誠為此爾強立自心與識境同故曰等識境妄想大慧譬如泥團微塵乃至而自真相實不滅因真想而有藏識因藏識而有轉識有所因則非異矣真相不滅則藏識亦不滅若夫轉識有所攝受所謂業相也此則未嘗不滅一滅一不滅則非不異矣蓋不異者其體也異者其用也譬泥團金具雖不同一本於微塵與金言此以明業相轉識雖滅皆本於不滅之真相爾是故大慧非自真相識滅乃至無始流注應斷無始流注斷乃斷見也以不了唯心故大慧外道説流注生因乃至若時若微塵謂外道異因非必眼界識界色界無明界所生也又有因於勝妙等説論曰不滅真相即達磨所傳之一心也明靈虗徹亘古亘今究其本源無有間雜妄想和合乃有諸識諸識所現乃有諸相諸相不常乃有生住滅覺此則涅槃樂迷此則生死河達道之人覺彼所現幻塵不實皆由無始妄想所薰回光返照還於真識如水歸坎流浪自停如火歸空光芒頓滅便可逍遙自在心境俱忘永謝諸塵端然實相蓋為薰習尚在未免攀緣終日依他不自知覺則有強生知見立自本心不知陰界藏身徒然以佛覔佛一則依他境界一則以心緣心二病未除妄相相續故如來必欲所緣俱息依因並捐轉業兼離真相永淨是道也非從他得只是家珍目前歷歷孤明認著依前埋沒不須取捨本自圓成但離妄緣即是實際佛語心品明此而已頌曰如何歷劫沉生死只為從前有識因當覺二生無別體要知八相亦非塵有情須信唯心起分別都緣妄想薰若覆根塵皆不實就中不滅相還真了妄明真分第二復次大慧有七種性自性乃至性自性第一義心此是梵音肝栗大謂如樹木心非念慮心念慮心梵音女質多以性自性第一義心乃至不與外道論惡見共採諸境而集於心曰集心生則性生曰性性生而相現曰相四大從之曰大種依他而生曰因緣因而作曰緣覺性圓照曰成如如真相中不容他緣妄情生幻出諸性唯是大覺照觀真源達彼性生無非妄現彼諸體寂本空皆是覺心自為現量知自現已乃滅幻塵幻滅覺圓即如如爾楞伽自性蓋皆如此道光返照一心故曰心明心必本於燭邪之慧故曰慧用慧必貴於決斷之智故曰智有智而後正見明故曰見有正見者然後超有無故曰超二見超二見然後超佛子地故曰子地超子地已然後捨法雲之灌頂登正覺之道場故曰如來自到如來以出世心造此境界超諸塵妄過越邪宗外道不能踵其門二乘不能造其奧故曰第一義夫一心本寂烏有性相萬法皆空孰名境界然如來言自性不同皆以識破外塵故言第一義不同皆以超然全真故惟其外塵不染獨爾全真如來成就心法者實出於此故曰第一義心云何外道論惡見共所謂自境界妄想見外道惡見於自境界但起妄想之見不覺識自心所現乃至自心所現幻境隨見今當説以三有苦滅故能覺見自心所現於所現境忽如幻化大慧若有沙門婆羅門自沙門已下至妄稱一切智説皆外道見欲令無種有種乃至破壞斷滅論外道斷見於若相續等句一切破壞而斷滅之所以者何乃至及見始非分故以不見根本故曰見始非分譬如破瓶乃至不作牙事外道斷見於法悉如破瓶焦種者如是大慧乃至彼無次第生彼欲一切斷滅使妄想無因則無生也大慧若復説有種無種識三緣合生者乃至自見過習氣作如是説外道以三相承彼覺想之地轉而不自知非自覺而隨境有覺曰覺想過在己見曰自見過如是愚癡凡夫惡見所害乃至健闥婆城無生幻焰水月及夢數者虗幻而謂有自性以喻妄念汝門若正見當離此也自諸餘沙門已下皆論正見與外道異內外心現妄想無始虗偽不離自心所以能離彼自性者以覺知所現妄偽悉不離自心故妄想因緣滅盡乃至攝受及攝受者不相應謂之不相應則其情滅矣無所有境界離生住滅識境不相應則無所有矣至無所有則一切生滅離自心起隨入分別所謂真心任遍知也大慧彼菩薩不久乃至無開發方便謂心地如如無所開發大慧彼於一切衆生界皆悉如幻不勒因緣不勒云者不勞心於因緣者也遠離內外境界乃至住般若波羅蜜始也覺惟心現至於度自心現則廓然無朕無智無得乃依般若而住捨離彼生所作方便心無依他則能離彼生之所作金剛喻三摩提乃至隨入如如化化物而未嘗化故曰如如神通自在乃至心因緣所作方便生住滅妄想虗偽固緣生滅皆心所造故曰心也言此悉當遠離唯心直進乃至思惟無所有於三界思惟悉無一法可當情者故曰無所有佛地無生至於佛地萬法無生到自覺聖趣自心自在乃至諸地漸次相續建立謂以十地漸次觀衆生心量隨根而度之故如衆色摩尼是故大慧自悉檀善應當修學悉檀宗也非宗人而自宗為善頌曰七般性義最精微成就如來上上機陰似破瓶皆斷見性同幻焰亦須離真心直進非他物佛地無生更無疑從此始隨心量度宛如隨衆色摩尼澄識明心分第三爾時大慧菩薩復白佛言世尊所説心意意識乃至自心見等所緣境界不和合大慧言一切諸佛菩薩所行與彼妄心見所緣境界者不同故曰不和合顯示一切説成真實相惟與妄心不同故顯示以真實相一切佛語心為楞伽國摩羅耶山乃至境界法身心之與識猶海之與浪本無同異真源還復即是心宗妄緣無明乃名為識馬祖語楞伽經謂以佛語心為宗以無門為法門以佛語心為宗者謂即心為宗除外更無別法以無門為法門者謂即心是法有門即是妄緣心外無宗有門離法楞伽大旨其在斯乎故此一篇特以心識為喻爾時世尊告大慧菩薩言四因緣故眼識轉乃至隨次境界生亦復如是藏識譬則水流處轉識譬則浪生如眼之有識則六根毛孔如塵而生諸境界之生亦然譬如明鏡現衆色像乃至合業生相謂外攬所作之事而內之業相乃生故曰合也卅二相若異若不異深入計著不能了知色等自性故五識身轉色等如幻還彼自性了知者如此大慧即彼五識身俱因差別分段相知乃至攝受不具故滅彼五識轉時不自覺知亦如入禪三昧者不知其識實不滅也入禪定者非必習氣滅也但攝受諸相不具於心爾如是微細藏識究竟邊際乃至餘地相智慧巧便分別餘地相謂地前菩薩見解也當巧便分別以祛其病爾決斷句義最勝無邊乃至能見自心妄想流注妄想永淨故曰離有必見之故又曰能見自心妄想心名採集業因心採集乃有諸法意名廣採集諸識識所識現等境説五受用建立身是衆生現識因彼現識建立其身復次大慧若菩薩摩訶薩欲知自心現量乃至當通達自心現妄想之相頌曰因緣四種惑癡盲心海從茲浪不平有似猛風吹巨浸又如明鏡現諸形本來廓徹休言性才有纖毫墮識情堪嘆細微難測了悉離覺想始無生超乘證幻分第四復次大慧菩薩摩訶薩建立智慧相住已能了識明心即住於智慧故曰建立智慧相住已能捨跛驢心慧智相謂第七地觀三界生死不定心名跛驢以不能行故是故大慧聖智三相當勤修學頌曰智慧已除諸識浪宜觀三相善勤行先離斷見云非有次證如來自願生性相頓忘無所著世間如幻不留情從茲始到空王殿聖智于今決定成有無俱遣分第五爾時大慧菩薩知大菩薩衆心之所念乃至百八句分別所依謂此經乃百八句分別之所依歸入自相共相妄想自性謂之自性凡以法性自爾非若二乘外道之斷絶也經凡言自性皆如此佛告大慧有一種外道作無所有妄想計著覺知因盡因盡則無復自覺知矣兔無角想如兔無角一切法亦復如是此外道計無而生斷見也復有餘外道見種求那極微陀羅驃形處橫法各各差別説云求那依也陀羅驃主也謂外道見四大種依於極微所主形處遂橫計其差別作牛有角想見已計著無兔角橫法作牛有角想此外道計有而生常見也以懲兔角之無乃墮牛角之有橫法謂非法之正耳大慧一切法性亦復如是一切法性亦受用而建立離有無不應作想乃至乃至微塵分別事性悉不可得以懲彼有無二見乃謂如兔無角故曰待觀以至微塵分別性皆不可得是皆邪想爾大慧聖境界離不應作牛有角想兔無角想是墮斷見聖之所離恐其反此復墮常見而興牛有角想故又言不應作牛有角想爾時大慧菩薩白佛言世尊乃至隨此思量觀察不生妄想言無耶大慧謂隨比而思之見妄不生而遂言無耶此疑辭也佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故謂妄想皆因攬彼而生故曰因彼生故依彼角生妄想乃至離異不異故謂兔無角而生妄想是有所依角與妄想非異非不異大慧虗空是色隨入色種色是虗空持所持處以色為所則空為能矣謂所持者雖實而能持者常空所建立性色空事分別當知乃至若言觀餘物者彼法亦然人見其廓然大空以是為空而不知色之所聚人見其具諸名相以是為色而不知為空所持是皆於無性之中而妄有建立者然也此以明外道因牛角之有而遂言兔角之無不知析彼牛角為微塵又復歸於無矣謂牛角既析而歸空又何所觀故而言兔角之無也四大種雖不住空而非無空亦如牛角之有而復歸於無爾時世尊欲重宣此義而説偈言色等及心無言色與慮心皆寂不起色妄想已上廣説所説心量安立處惡見所不樂不樂惡見救世之所説自覺之境界頌曰昧者不知真境界却將妄想汙情田離空論色徒偏見棄有歸無墮一邊萬法但從心鏡現群愚只向識根緣圓光本是無私照才有纖毫總不玄漸淨即頓分第六爾時大慧菩薩為淨除自心現流故乃至為頓為漸耶自心現習氣流曰現流現流不已輪轉生死如來於諸衆生蠲彼幻塵悉還實相故以漸除為始頓照為成彼諸依佛亦復如是乃至以修行者安處於彼色究竟天依佛者胡本云津膩謂化佛是真佛氣分也依佛所化亦為分別自心所現及身受用境界故以藏識依佛譬能頓示衆生不思議智譬如法佛所作依佛光明照耀乃至有性無性惡見妄想照令除滅法佛無作光明照耀者化佛也然化佛之照耀非離法佛故曰依佛法佛者自覺聖智境界於法相有無惡見皆令除滅亦如化佛之照耀也自菴羅果已下言漸淨自譬明鏡已下言頓熟大慧報佛説一切法乃至種種計著不可得種種計著亦如幻化求其所有皆不可得復次大慧計著緣起自性乃至彼諸妄想亦無真實工幻師譬心草木瓦石譬緣起一切若干形色譬妄想自性相如是大慧依緣起自性起妄想自性乃至是名報佛説法法佛不以説法為事所謂説法者報佛也起信論云因諸波羅等無行薰及不思議薰之所成就具足無量樂相故説為報佛以是知報佛説法者以觀照種種不實成就圓滿報身故大慧法佛者離心自性相説自心所現尚有心之性相至於法佛不以説法為事故曰離心自性相自覺聖所緣境界建立施作乃至超外道見無色見自施戒忍至無色見等皆以一法身而示現衆多法門故曰化佛説法也又法佛者離攀緣攀緣離乃至自心現見應當除滅佛身一也論其本來清淨逈脫諸塵曰法佛論其具足樂相法界圓滿曰報佛論其即彼一真建立萬法曰化佛法佛離心自性相故自覺聖當勤修學報佛化佛分別自心境界故自心現見應當除滅頌曰本來離相亦離名即一分三示衆盲始淨諸塵須積漸終能頓照甚分明報身真淨蠲諸想化佛隨緣應有情惟是法身根量滅無心無證亦無成離二種聲聞分第七復次大慧有二種聲聞乘通分別相乃至真諦離欲寂滅謂於無常苦空等境界計著寂滅已得人無我未得法無我息陰界入自共相外不壞相如實知於陰界外存不壞相是以無明與佛性為兩也皆自慧分別心得寂止乃至三昧道果正受解脫自覺聖差別相其所樂住者此也不離習氣不思議變易死以習氣未離故未度不思議變易死得自覺聖樂住聲聞乃至非滅門樂於自覺差別相樂住此乃決定寂滅聲聞非菩薩所行寂滅門樂故曰非滅門樂正受樂謂得三昧正受樂𮨇憫衆生及本願不作證乃至堅濕暖動非作生自相共相一切自生而吾無作生故曰非作生先勝善説見已如來所説善事曰先勝善説於彼起自性妄想大種青黃本非作生於彼起非作生之自性先勝善説本來無性於彼起善説之自性故曰性妄想自性是皆未入法無我相而有所計著故住聲聞菩薩摩訶薩於彼應知應捨乃至是名諸聲聞性妄想自性計著相頌曰號為自覺已無遺反墮聲聞不自知已達苦空能寂止彼於習氣未能離優遊正受雖其樂顧憫衆生不帶悲更有一般聞勝善妄生自性却狐疑常不思議差別分第八爾時大慧菩薩白佛言世尊世尊所説常不思議乃至非諸外道所説常不思議因緣耶常住真心如金剛舍利故曰常不可以心思言議故曰不思議佛告大慧乃至若常不思議不因自相成者何因顯現常不思議自相所謂真相復次大慧乃至常不思議不成以有作為因相故不成一切取捨莫非有作大惠我第一義常不思議乃至得自覺相故有相自覺相者廓然無朕之相也光境俱忘相復何有第一義智因故有因離性非性故雖曰有相有因常離性非性見復次大慧外道常不思議無常性異相因故外道常不思議以性及非性互相為因所以無常非自作因相力故常乃至見已思量計常一切所作性與非性皆無常外道觀彼無常即自卜度妄計我常大慧我亦以如是因緣所作者乃至説彼常無因故但惟自覺無因而説彼常也若復諸外道乃至自因相性非性同於兔角謂外道雖因相成而非因於自相故曰性非性同兔角此常不思議但言説妄想乃至得自覺聖智境界相遠彼不應説外道計常則離去自因之相遠於自覺境界故曰不應説頌曰無知外道太茫茫於彼無常妄計常却向識根生作想又如兔角絶形彰堪嗟幻焰應難久須信真金鍊轉剛惟有如來因自相豈同電露暫時亡生死涅槃差別分第九復次大慧諸聲聞畏生死妄想苦而求涅槃乃至一切性妄想非性於一切性妄想以為非性未來諸根境界休息作涅槃想謂之休息非根量滅非自覺聖智趣藏識轉但藏識轉爾是故凡愚説有三乘説心量趣無所有凡愚説心量曰無所有故墮斷見彼不知過去未來現在乃至生死輪常轉自心現則覺知所現者唯自心外心現則計著客塵不自覺而計客塵茲所以生死輪常轉也頌曰聲聞不委惟心境却向無中作涅槃縱待根塵休息盡誰知生死出還難一切法不生差別分第十復次大慧一切法不生乃至離有非有生故謂本來空寂而自心於無生中現出性及非性之見現性即有見生現非生即非有見生如來一切法不生則離於是矣大慧一切性不生乃至身財建立趣自性相有妄想自性而有妄想身財建立趣彼自性相計著故曰趣自性相大慧藏識攝所攝相轉乃至於彼應當修學頌曰遠離性相絶廉纖諸法無生不用占空認兔頭成斷見妄從自性起諸炎難於眼裏藏金屑休向空中作白粘若問如來心現説無生有性却成添五無間種性差別分第十一復次大慧有五無間種性乃至及樂修相智修諸有相之智故曰相智不修緣起發悟之相所緣萬境必有所起原其所起一心是也於此當求發悟不於起處而求發悟雖欲滅相適增妄想起煩惱斷習煩惱不斷如波之起曰起煩惱習煩惱謂習氣也不度不思議變易死乃至乃至得般涅槃覺有涅槃想故曰得涅槃覺大慧各別無間者我人衆生乃至作如是覺謂作離四相見解者求般涅槃復有異外道説悉由作者言一切性皆是有作見一切性已乃至不出出覺於未出中作出離想故曰不出出覺彼如來乘無間種性有四種謂自性法無間種性自性法謂一切性彼自有性離性非性見得自覺聖無間種性外剎殊勝無間種性自覺即無相三昧外剎則塵塵三昧大慧不定種性者謂説彼三種時未到如來乘無間故言三種而已隨説而入隨彼而成此是初治地者謂種性建立為超入無所有地故作是建立謂雖隨種性建立要之不著聲聞緣覺之乘故能超入無所有地無所有地初地菩薩也故云此是初治地者彼自覺藏者乃至當得如來最勝之身自覺藏謂不定種性中能自覺者也雖得三昧樂而住聲聞至此當證佛地故曰當得諸聖遠離寂聖亦不滯於寂故曰遠離第一義法門遠離於二教乃至亦無有心量頌曰五般無間有差殊見性還歸各別塗緣覺妄隨神化勝聲聞空斷陰雲粗滿懷了了他無性外剎塵塵用不殊方顯如來真種性更無心量可名模一闡提差別分第十二大慧彼一闡提非一闡提世間解脫誰轉謂世間皆有解脫之性若非一闡提則世間解脫誰復背轉以一闡提者於善法中不生信心故二者菩薩本自願方便故謂本意自願涅槃樂非不般涅槃乃至是名不般涅槃法相涅槃法相乃真解脫解脫者空無相無願今也本自願方便非不欲涅槃一切衆生已而後般涅槃畢竟自著於寂滅之相非無相無願也故曰不涅槃法相若夫如來滅度一切衆生已而無有一衆生實滅度者以無相無願故此亦到一闡提趣此非為捨善根者説故曰亦到一闡提趣佛告大慧菩薩一闡提者乃至而非捨一切善根一闡提也謂知一切本來涅槃已而自著於寂滅之相是墮斷見故曰畢竟不般涅槃大慧捨一切善根一闡提者乃至以是故菩薩一闡提不般涅槃頌曰惟有慈悲一闡提度他迷者自還迷若論捨善猶能轉菩薩都無趣寂期三自性差別分第十三復次大慧菩薩摩訶薩當善三自性本來空寂所有性相如幻如夢彼皆自爾如來無攝取之情亦無滅之之想經言性自性皆如此佛告大慧緣起自性事相相行顯現事相相緣起謂心從緣起顯現謂所作已著於彼事相之相而計著之故曰事相相計著有二種種妄想自性乃至謂即彼如是內外自共相計著名虗而事實故有二種相之異是名成自性如來藏心惟自覺聖乃可言成自性惟成自性乃可言如來藏心大慧是名觀察五法自性相經此楞伽之異名自覺聖智趣所行境界汝等菩薩應當修學頌曰二般妄想性無窮緣起依他妄亦同惟有離名成自性吹毛寶劒但揮空觀二無我分第十四復次大慧菩薩摩訶薩善觀二種無我相乃至謂離我我所人無我者則能離我我所其所離者謂如下文所述陰界入聚乃至謂一切諸根自心現器身藏由陰界入聚即生無知業愛由攝受眼色等而計著之即生一切業識以此知一切諸根皆由自心現出形器身財也自妄想相施設顯示如河流如種子生出不已如燈如風乃至生死趣有輪以有虗偽習氣之因乃有生死輪轉之趣種種身色如幻術神呪幻則現出不實呪則無而忽有發起像起如機括之發不可禦如鏡之像因彼而現善彼相知善彼相知謂善知彼相皆當遠離以前一離字該之若能善知即能遠離非假於滅之之斷見故但曰善彼相知而已是名人無我智云何法無我智乃至如陰界入離我我所陰界妄想自性人也能覺而離之使離我我所則人無我矣覺而離之者法也於其覺性又當離之亦如陰界入之離我我所然後法無我矣陰界入積聚乃至生無動搖諸法亦爾陰界積聚本皆無性因於業愛其縛如繩展轉相緣生於無動搖之境此人無我者之善觀也一切法性本亦寂然因於愛取攬攝而生所生之境本亦不動法無我者所觀亦然故曰諸法亦爾離自共相不實妄想乃至非賢聖也一切虗偽故曰不實妄想相如河流種子是也為彼驅使故曰妄想力如機發繩縛是也但能離此則知人無我而已此凡夫所能離爾故曰非聖賢也心意識五法自性離故乃至一切法無我心意識五法自性離即至法無我矣故繼之以菩薩當分別一切法無我也言菩薩當分別法無我凡以別其善人無我者二乘與凡夫爾善法無我菩薩乃至大寶宮殿幻自性境界修習生一切法如幻彼幻惟自性覺彼如幻自性則一切法如幻矣至法雲地方知法如幻乃不住虗寂而建立一切慈悲法行即大寶蓮華王像等是也於彼而坐同一像類乃至是名法無我相聲聞地前皆未能了法無我故未能證如來自在法身於此始言當得如來法身汝等諸菩薩應當修學頌曰如來實相等無差學者紛然亂似麻將謂已除人陰界誰知又被法雲遮慧燈自是無狂𦦨定水從何覓覺花萬法了知如幻化莊嚴端坐法王家離建立誹謗分第十五爾時大慧菩薩復白佛言世尊建立誹謗相唯願説之本來空寂妄有所立曰建立或觀建立自無所得而生誹謗故曰誹謗皆不明心量故爾時世尊於此偈義乃至有四種非有有建立本來非有以妄想而有建立故曰非有建立云何為四乃至觀察非分而起誹謗於前所建立不善觀察即生斷見而起誹謗是名建立誹謗相復次大慧云何非有相建立相乃至人衆生壽命長養士夫見建立四相之見亦如陰界入之妄想虗偽是無見中而妄立有見是名非有見建立相非有因建立相者乃至生已實已還壞諸識本無所因以眼界色界無明界在念前而生則是於無因中有建立也是名非有因建立相非有性建立相者乃至是名非有性建立相虗空涅槃假名以顯道其本離性及非性兔角垂髮執妄以迷真本亦離有及非有是皆情計妄立性相故建立及誹謗愚夫妄想乃至是故離建立誹謗惡見應當修學頌曰佛地難登理謂何只因沉溺斷常河建言謂有應為病謗法稱無即是魔湛寂性中離取捨圓明境界絶偏頗須知自覺惟心境鏡本無塵不用磨隨類普現分第十六復次大慧菩薩摩訶薩善知心意意識五法自性二無我相趣乃至所謂一切法如幻如夢光影水月為安衆生建立萬法猶如色現摩尼以至普現佛剎聽受經法亦如幻夢水月未嘗一法有計著性者故龍宮滿字之浩煩而如來云未曾説一字也於一法離生滅斷常乃至爾時世尊欲重宣此義而説偈言心量世間佛子觀察種類之身離所作行得力神通自在成就頌曰已圓大智為懷悲却效衆生性相迷顯示法王諸像類宛如隨衆色摩尼龍宮萬卷聲喧谷行海千門月在池到此遍遊諸佛剎宣揚三寶作天師空離自性分第十七爾時大慧菩薩復請佛言惟願世尊乃至疾得阿耨多羅三藐三菩提説空者多墮斷見墮斷見則有生有二而有自性相大慧於此願聞説空而繼之以無生無二離自性相故如來亦言為妄想自生性計著者説空大慧彼略説七種空謂相空性自性空前言惟自性至此性自性亦空矣行空一切法離言説空乃至自他俱性無性故相不住自他俱見亦皆無性則不住於相矣恐人於無性又生斷見不住相云者非無相也但不住爾是故説一切性相空是名相空云何性自性空謂自己性自性不生性自性云者為欲識破外塵還一切性於其自而自己無有性自性想則一切性自性空矣是名一切法性自性空乃至云何行空乃至因所成所住業方便生陰之所蘊本離我我所皆因所作方便而生以此知行空是名行空即此如是行空乃至是名無行空彼行空者亦無自性故曰無行空云何一切法離言説空乃至是名一切法離言説空妄想自性本無言説既無言説復何所離故曰離言説空云何一切法第一義聖智大空乃至一切見過習氣空能見一切過患曰見過自覺聖智雖已離過患而見過之心未忘雖止見行而習氣未除至此則一切皆空矣是名一切法第一義聖智大空此空為大故曰大空祖師曰廓然無聖是之謂歟云何彼彼空謂於彼無彼空是名彼彼空謂彼中無彼物故言空不知其雖無彼而又有此也蓋法自有相何用分別其分別性亦空曰故彼彼空譬如鹿子母舍乃至亦非比丘比丘性空舍本不空故曰非舍空説舍則有舍故非舍性空非餘處無象馬乃至是名彼彼空有鹿子母舍則舍性非空有比丘衆則比丘性非空雖無象馬餘處有之亦非空然皆一切法之自性相又何必言彼無彼當知無彼性亦空矣故曰彼彼空世間法相本來常住謂之無彼未免墮斷故曰是空最粗是名七種空乃至大慧不自生非不生即真而動了無生滅之性故曰不自生非執無生之性若木石然故曰非不生除住三昧是名無生離自性唯住三昧正受更不立無生之想即是無生離自性乃至是故一切性離自性剎那之頃流及他性以是而現一切性皆離自性一切性者境也言境則知所謂無生者法也云何無二乃至是名無二萬法體空本無性相涅槃生死豈有二耶苟於涅槃生死有彼此二性則有二相故曰異相因有性故如涅槃生死乃至應當修學為有妄想計著故言空以治之然謂之空則無生矣無生有性則反墮斷見謂之空則無二矣無二有性則反墮常見故如來説空而繼之以無生無二又曰離自性相者蓋於空之無生無二又當離自性相故也爾時世尊欲重宣此義而説偈言我常説空法遠離於斷常生死如幻夢而彼業不壞虗空及涅槃滅二亦如是愚夫作妄想諸聖離有無頌曰衆生妄想未消除諸佛談空為斂粗須到不生仍不二更無自性即無虞有心未解袪常斷離性方能度有無若是大空何所證冰霜一點在紅爐離言即義分第十八爾時世尊復告大慧菩薩言空無生無二離自性相普入諸佛一切修多羅乃至是故當依於義莫著言説頌曰覺皇不捨大慈悲言説紛紜為止啼若到岸頭何用筏休如渴鹿妄生疑
