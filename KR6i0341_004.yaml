body:
  text: 一切佛語心品第四離一切根量分第五十八如我所說一切法無我當知此義無我性是無我佛說諸法無我以諸法中無有我性故說無我非是無有諸法自性故下文云云一切法有自性無他性乃至馬牛性譬如牛無馬性馬無牛性非無自性一切諸法非無自相乃至以妄想故聲緣外道棄有墮空不離妄想故於諸法自性未能了知如是一切法空無生無自性當如是知謂若知此乃證空義如是如來與陰非異非不異如來清淨法身與諸陰界無異不異之性相若不異陰者應是無常若異者方便則空若離陰即是斷見若二者應有異乃至一切法亦如是非離陰而別有法身故如牛角之相似然以方便而成實相茲所以有差別如是智及爾炎謂之爾炎則因物而起矣悉離一切量見聞覺識是名為量正觀察我通我通即無我是也是名為正觀不毀大導師頌曰佛陀實際絶行蹤非事非因蔑異同根量兩頭俱截斷逈然忘照若虗空不生不滅離言說分第五十九如世尊說修多羅攝受不生不滅梵語修多羅此間契經謂經中攝受不生不滅之說不生不滅亦非無義不生不滅若無實義即斷見也大慧我說意生法身如來名號彼不生者謂之意生雖生而未嘗生乃是不生者我於此娑訶世界娑訶譯言能忍大慧彼諸癡人作如是言義如言說義說無異謂彼義說不知自通亦如言說大慧彼惡燒智惡能滅慧如燒物然令離心意意識故不為得自覺聖智處於聖智言處以別聖智不在言說一切虗僞息是名如實謂之如實以明其非有是相與此相違計著言說應當遠離頌曰如來境界豈容聲苦口紛紛為衆情離說離言方合道不生不滅只空名真心出入波中月法相縱橫鑑裏形實際義中無一字涅槃生死坦然平袪外道不生不滅分第六十外物因緣亦如是言外物則以別無明愛業者內也外道示說四大不壞乃至世尊所說亦復如是外道分別諸大佛亦分別諸大如向所說一世界中應有多佛無差別故大慧謂佛不可多得故言無有是處若言多佛豈外道亦是佛而佛與外道更無差別耶佛告大慧我說不生不滅乃至得不生不變相此性自性謂自立不變之性相我不如是墮有無品乃至如種種幻夢現故非無性佛說無性但如幻夢而已既不著有亦不墮空故下文云云云何無性乃至攝不攝故色本無自性但人攝受與不攝受現與不現乃有或有或無之見以是故一切性無性非無性乃至妄想不生謂之無性非同斷見但覺自心現量而妄想不生則自無性矣非諸聖賢不如實者聖賢不除妄想亦不如實然不起生滅想與凡夫異不爾如性自性乃至不見寂靜不爾者異前之辭也如來於一切性自性如之而已於妄想未嘗有異之之念不見寂靜者乃至非相見相者受生因故不勝見無相者各為勝相若非相而見有相則不斷有生之因故為不勝無相者妄想不生乃至離先妄想心心數法如真實義見則雖見而無所見心心數法悉皆離之蓋如來涅槃如實印所印無起滅之性相故也一切法不生無性無所有亦非無性無因而相現謂本無因惟心所現熾然無因論恐怖諸外道故或說無因以恐怖外道故其身隨轉變謂轉所依無外性無性亦無無性慧無所分別離鉤鎖而求法愚夫所分別爾是則不成就謂非聖智離數無異法謂離鎖更無別法唯說一乘法是則為大乘頌曰不生不滅義如如外道如何辨等殊只為立名兼立相遂令歸有或歸無一靈妙覺波還水萬種塵緣雪在爐如實界中亡取捨更無真妄可名模袪外道七無常見分第六十一佛告大慧一切外道有七種無常乃至無常毀一切性轉即色言色之相色轉變言色之性故別立此句一切色相轉變無窮而其中間轉變之性不住散壞莫見其迹若乳變為酪是謂色轉變無常也有說性無常乃至有說一切法不生無常入一切法以本不生而復生一切法是以不生而入生也以不生而入生故云不生無常入一切法大慧性無性無常者乃至四大自性不可得不生外道謂四大相壞而四大自性不生不可得故言性無性無常彼不生無常者乃至墮一切外道生無常義外道分析一切法皆不生故自立不生之相乃有不生無常之句若不覺此則是於不生中而反有生大慧性無常者是自心妄想乃至謂無常自性不壞立無常性者謂無常自不壞滅而能壞滅諸法故下文云云大慧此是一切性無性無常事乃至作所作無異者一切性常無因性立無常性者將以壞滅一切法性令皆無性如以杖瓦石等破壞諸物令各歸壞滅所謂無常事也彼蓋不知作者在乎心也所作者事物之有相也作與所作不同而外道謂非有差別皆欲歸於無常故曰性無常者是自心妄想大慧一切性無性有因乃至作所作無有別異而悉見有異性無性因自心現非因不相似事而生若不深探其因心所現而云因不相似事是著一切色相而見一切性皆無常矣若是則向之外道所謂作所作無有別異而今於一切色相悉見有異若性無常者乃至一切性不究竟真空無作無因立無常性以破壞一切色相是有作也因一切不相似色相而壞滅之是有因也以其溺於性相故曰不究竟一切性作因相墮者乃至一切性不無常應是常墮作因相則無常自性與物俱轉亦無常矣自無常故一切性相皆應是常若無常入一切性者乃至一切三有四大及造色在所知有生滅大種造色非異非不異其自性亦不壞彼外道不滅諸大以三界依四大及微塵等是故隨彼所知說生住滅離四大造色乃至四大不生自性相不壞故外道虗妄分別謂離四大諸塵等法更有無常是故說言諸大不生以自性相常不壞故離始造無常者謂作已而捨也非四大復有異乃至四大不壞形處壞現墮在數論外道以四大造色不壞分析乃至微塵但滅形狀長短異見不滅四大造色故墮世論色即無常者乃至若四大無常者非俗數言說外道謂色無常即是形處無常非大種性若大種性亦無常者則無世事無世事者則墮世論故下文云云世俗言說非性者乃至火燒四大時自相不燒各各自相相壞者四大造色應斷外道言如火燒諸大而自相尚在彼蓋謂必待自相皆壞然後四大造色之相斷已上皆外道見大慧我法起乃至謂外性不決定故如來於外性如幻未嘗決定有無之想唯說三有微心乃至二種妄想離外性無性二種見四大及造色二種事本來空寂皆以有攝及所攝性乃知爾如來如實而知二種妄想以不取有無二種相故覺自心現量妄想者乃至離心性無性妄想覺自心現量者唯見自心妄想名為作行生而實不生以離心性及無性妄想故如是我所說唯是彼心量頌曰外道雖聰智弗長溺於性相說無常誰知心外無餘法不攝纖塵是道場超諸地相分第六十二爾時大慧菩薩復白佛言世尊唯願為說乃至不墮一切聲聞緣覺外道愚癡自初地至十地皆由滅正受而入佛地故云滅正受次第相續或有聲聞緣覺於此起涅槃想而於如來地不滿足此大慧所以云不妄捨滅正受樂門不墮聲聞外道愚癡不妄捨者謂於三昧樂有所持也佛告大慧六地起菩薩及聲聞緣覺入滅正受此聲聞乃第六地聲聞第七地菩薩念念正受離一切性自性相正受滅諸念而正受者六地也隨念不離正受七地為然以能離一切法自性相故非聲聞緣覺此是七地菩薩非是七地聲聞諸聲聞緣覺墮有行覺乃至非念正受聲聞緣覺緣有為行而入正受及先墮攝所攝境界是七地聲聞未能隨念正受故曰非念正受所以別七地菩薩得一切法無差別相非分得種種相性未得一切法無差別故曰非分以見諸法種種異相故覺一切法善不善性相正受是故七地無善正念分別善不善性相而入正受是七地聲聞也於隨念正受則無善巧方便故曰無善念正受亦以別七地菩薩大慧八地菩薩乃至心意意識妄想相滅此聲聞乃八地聲聞也八地菩薩聲聞於意識妄想非有斷滅之想故曰相滅相滅者如圓覺云於一切處不起妄想於妄想境不加了知是也初地乃至七地菩薩乃至外性種種相七地菩薩觀三界心意意識其本離我我所唯是自心妄想乃墮外性種種諸相此謂自七地墮外道邪徑者愚夫二種自心攝所攝乃至虗僞習氣所薰二種自心謂外道於我我所及有無二邊而生攝所攝計著不知由無始來過惡薰習大慧八地菩薩聲聞緣覺涅槃此文亦以別八地菩薩與八地聲聞雖皆曰涅槃而實不同菩薩者三昧覺所持乃至不般涅槃八地菩薩於三昧正受覺而有所持故雖有三昧樂而不作涅槃想若不持者乃至佛種則應斷三昧覺所持故不忘大悲本願而為衆生若一切滅盡而證涅槃即墮斷空何衆生之能顧愍諸佛世尊乃至無量功德諸佛所以示現如來功德者為欲菩薩顧愍衆生故聲聞緣覺三昧門得樂所牽故作涅槃想此八地聲聞也菩薩非不涅槃無心於涅槃故不般涅槃聲聞牽於三昧門樂則是有心於涅槃故曰想大慧我分部七地分別部分其所得法善修心意意識相乃至人法無我生滅自共相人法無我生滅自共相皆善修也善四無礙乃至次第相續入道品法佛之分部七地菩薩所得如此不令菩薩乃至立地次第佛所以立地次第而分部七地者為此大慧彼實無有乃至除自心現量諸地次第皆是自心所現其實無有若生若滅如來於此但指惟心而一切生滅頓了所謂地次第相續及乃至及說三界種種行世尊及諸佛以對治衆生病故有諸地次第及三界種種行之說愚夫不覺而有執著殊不知佛說而未嘗說也頌曰十地皆因邪徑設那堪地上有聲聞初根斷滅方歸正七地惟心妄始分八地常持三昧覺每於群品布慈雲自心若了無餘事階漸紛綸只謾云滅諸地而證圓覺分第六十三復次大慧聲聞緣覺第八菩薩地謂聲聞在第八地者滅三昧門樂乃至妄想涅槃想謂有人法無我之相及攝受法之見蓋以妄想心為涅槃故非寂滅智慧覺乃至本願哀愍大悲成就第八菩薩見寂滅三昧樂門便能憶持本願依大慈悲成就衆生知分別十無盡句乃至非佛法因不生隨智慧生八地菩薩已離諸法妄想於是復修一切佛法非因於此則餘無所生然所以生非妄想生隨智慧生得如來自覺地乃至為正為邪非正非邪八地菩薩於如來自覺之地如人夢臨大水欲渡其身未渡中間忽然便寤寤已思惟此為是實為復是虗餘無始見聞覺識乃至心意意識夢現向之所見非虗非實唯是無始見聞覺識習氣所薰不離有無二相至此則心意意識一切頓覺悉如幻夢隨緣而現無去之之想覺已則滅無留之之情故曰夢現謂之夢現則現已還滅非有斷滅之想也大慧如是菩薩摩訶薩於第八菩薩地乃至行已作佛法方便未得者令得第八地已無妄想生之見所可見者乃初地轉進至七地所修行者皆第八地所見之妄想也唯見一切如幻而善離攝所攝心至此疑墮於空而乃勤修佛法未得令得故曰方便大慧此是菩薩涅槃乃至得無生法忍見如幻已而又復作佛事此乃涅槃方便非壞滅諸法名為涅槃故曰不壞蓋由善離心意意識是以得證無生法忍大慧於第一義乃至無所有妄想寂滅法次第說為喻菩薩之入外道邪徑者妄想寂滅皆是對治法若第一義諦一切根量滅則妄想寂滅皆無所有矣心量地第七第七地未離心量無所有第八至第八方無所有第三為第六無所有何次頌曰才登八地絶疑情心量因緣更不萌自得涅槃方便巧已離意識頓無生自心覺了誰求寂佛法何妨度衆盲若到如來無所證夢中度水覺何曾離常無常分第六十四佛告大慧如來應供乃至常者有作主過謂常者是於虗寂中強立真常之性故云作主常者一切外道乃至非常非作常有過故如來之常非無因而常亦非作主而常常與作常皆不免有過故若如來無常者乃至陰壞則應斷而如來不斷五陰相相本來無性若必欲陰壞而諸相斷滅然佛如來實非斷滅大慧一切所作乃至一切皆無常過若謂無常如瓶衣之無定相則一切法皆墮無常一切智衆具方便應無義以所作故若一切所作皆無常則一切智衆皆具有所修福慧悉空無義以無常有所作故一切所作皆應是如來乃至自覺聖智衆具無義過前言如來非無常此言如來非常若如虗空之常空無所有則自覺聖智衆皆具有一切皆無義矣大慧譬如虗空乃至是故如來非常此言雖非如虗空常然亦如虗空之性無所變動離常無常等過一有所說即有情量名相幾何而不墮於常無常耶復次大慧若如來無生常者乃至以無生常過故如來非常執無生而有常如兔馬等角悉無所有則一切方便皆無義若是又墮斷見此如來所以非常復次大慧更有餘事乃至謂無間所得智常故如來常此述如來實有常住之法而非世之所謂常無常者大慧若如來出世乃至諸佛如來無間住聲聞緣覺與如來所得智皆無間斷故曰住不住虗空亦非愚夫之所覺知乃至如來不從不實虗妄想生謂如來無間之智畢定常住非住虗空非墮陰識但離妄緣即如如矣大慧以二法故乃至無二生相故語常無常則有二法唯不二法乃能寂靜諸法以不二法者無生無二無性相故衆具無義者生常無常過若無分別覺永離常無常從其所立宗則有衆雜義等觀自心量言說不可得頌曰楞伽頂上絶纖塵常與無常屬作因兔角無生歸斷見虗空籠統亦非真若能自覺方為道才有言辭便不親須到如來無間智超然常住邁群倫滅識即藏分第六十五佛告大慧如來之藏是善不善因乃至生無明住地與七識俱無明本無住地以有識藏乃生如海浪身乃至畢竟清淨言如來藏離作無常及有我論其餘諸識有生有滅若墮於識即有生滅意意識等念念有七言因意識而有七識自心所現色相不覺苦樂起苦樂受故云不覺不至解脫名相諸纏貪生生貪因貪生故乃生貪著名如來藏識藏七識流轉不滅乃至自共相攝受生陰界入謂如來藏識藏止是其名不同因彼識藏而有攀緣故生諸識然非聲聞外道所知境界以彼不覺二無我及於蘊界處而取自相共相故見如來藏五法自性乃至相續轉進謂修行者若見如來藏及五法三自性於人法悉皆無我乃能滅諸地次第而住不動地得十三昧道門樂乃至不受三昧門樂及實際以觀察佛法自願則能顧愍衆生不滯空寂故於三昧門樂及實際皆不受及身智意生所立之智如意之生離三昧行著三昧行即有三昧相故當離之當淨如來及識藏名乃至名如來藏者則無生滅有如來藏及識藏二種名則有是性相而生滅起矣故當淨之淨之則無所有也大慧然諸凡聖悉有生滅乃至不捨方便雖曰如來藏無名亦無生滅而諸聖亦未嘗與木石同性故悉有生滅以是故修行者雖自覺聖智法樂現前而不捨於勇猛精進故曰不捨方便大慧此如來藏識藏乃至非諸如來如來無我之藏如如絶想本來清淨一切聲緣而以想見蓋由客塵所覆而見不淨如來者現前境界猶如掌中視阿摩勒果自覺境界常現在前則不復有心想之見蓋以無客塵覆故大慧我於此義乃至令勝鬘夫人藏中勝鬘經是也唯佛及餘利智依義菩薩智慧境界知聲聞計著寂滅則如來藏不可離知心想有生滅見則如來藏不可即以是唯佛菩薩智慧境界莫但聞聲作知足想未能自覺故曰聞覺甚深如來藏而與七識俱二種攝受生二種謂藏與識智者則遠離如鏡像現心心之所現如鏡現像心為工伎兒意如和伎者五識為伴侶妄想觀伎衆頌曰如來寶藏只虗名善惡皆由彼造成諸識盡時方合道靈機不染始無生有心作想應難淨真諦攀緣亦未精爭似現前無覆蓋還如摩勒掌中擎五法三自性二無我分別相分第六十六佛告大慧五法自性識乃至現法樂正受住現在前謂修行者若觀察此法入於如來自覺境界則得現法樂三昧常現在前未嘗暗昧所謂猶如掌中視阿摩勒果佛告大慧愚夫計著俗數名相乃至離相所相及生住滅從自心妄想生無實如幻奔馳如野馬隨現如水月彼皆自現其自現之性本來離我離相皆從自心妄想而生如此不異象馬車步男女等名謂以象馬等名而顯其相大慧正智者乃至猶如過客非有斷滅之相故捨離二見建立及誹謗知離有無二見及建立誹謗之所知名相不生非必不立名相名相自不生矣分別幻等一切法自覺法趣相分別如幻等法而證自得聖智所行法相為種種意解衆生分別說法隨意生解曰意解法身離意所作法身無為悉離意識之所作至此乃名如如是名菩薩入如如所得爾時大慧菩薩白佛言乃至為各有自相宗三自性謂妄想自性緣起自性成自性而皆不離於五法之內故曰入於五法佛告大慧三種自性乃至是妄想自性本無名相皆妄想生若依彼妄想生乃至各別分別持心本無所持以分別諸相而有所持故曰分別持以是故有緣起謂識藏意意識及五識身相者識有身財故曰身相若如是相名為瓶等謂有瓶相即有瓶名瓶等心心法是名妄想若依瓶相而生瓶名心及心法皆然始終無覺凡有覺皆覺想施設顯示於彼示彼衆生一切外道聲聞緣覺所不得相無復有聲聞外道之相故曰不得相正智及如如是則為成相頌曰三般自性示真詮悉入楞伽五法玄須了相名皆是妄逈離妄想即忘緣如如正智何須覺人法忘情始得圓高步便超三界外從茲親摘火中蓮優曇恆沙譬喻分第六十七佛告大慧莫如說受乃至諸佛易見非如優曇鉢華難得見故息方便求若言難遇如優曇鉢華即生退怯故說易見如恆河沙所以誘之欲其進也有時復觀諸受化者乃至優曇鉢華無已見今見當見說諸佛出世如優曇鉢華者依可化衆生故故云觀諸受化者如來者世間悉見乃至如優曇鉢華謂世間雖悉見如來而不得自覺聖智境界故說言如優曇鉢華大慧自建立自通者過世間望謂自覺聖智所得世間無等過諸譬喻故云過世間望大慧然我說譬佛如恆沙無有過咎譬佛如沙非為多故所譬具在下文非一義也猶如恆河等無有異又斷貪恚故其待魚鱉輸收等物等無有異故曰又斷貪恚譬如恆沙是地自性乃至如是如來法身如恆沙不壞地以火生而愚夫作地燒想地實不燒一切有身俱壞凡夫作法身壞想而如來法身實不壞如來法身非是身法身法即有壞之身相如壓恆沙油不可得乃至不捨法界自三昧願樂以大悲故衆生極苦遂感如來發大悲本願故曰逼迫猶壓沙也壓沙而油不可得欲令如來捨離法界中深心願樂亦不可得大慧譬如恆沙乃至是故說言如恆河沙沙譬則一切諸法水譬則涅槃流法雖千變皆隨涅槃未有一法而不涅槃者故曰非無水也雖所說一切法皆隨涅槃流而未嘗隨諸去流轉故曰隨流而性常如來不隨諸去流轉去是壞義故以涅槃非壞故不隨諸去流轉大慧生死本際不可知乃至為彼妄想作無邊等異名無始因滅然後覺知自心所現覺心自現則能了知外境不為妄想所轉故名解脫解脫者非是壞滅雖說無邊非都無所有曰無邊者亦為衆生妄想而立異名耳觀察內外離於妄想乃至一切諸法悉皆寂靜謂以解脫知見觀察內外諸法則離於妄想無別有衆生蓋以即此妄想名為衆生故如是觀者智及爾炎悉皆寂靜以解脫者識破衆生妄想心故故下文云云不識自心現妄想故妄想生若識則滅一切妄想不患不滅惟患其不能識了若能識了則妄想無自而生所謂解脫者此也隨流而性常是則佛正覺頌曰譬彼優曇亦未親恆沙設喻義兼陳不流不去如常寂無減無增類法身逈絶因緣何所異任他惱亂不曾嗔為君更說無窮量還似光明照剎塵剎那壞相差別分第六十八爾時大慧菩薩復白佛言惟願為說一切諸法剎那壞相剎那念也一念之頃心意俱生展轉變壞故曰剎那壞相蓋愚夫計著識相而然是心意意識習氣長養凡愚善不善妄想識習氣有善不善分別此剎那見也大慧修三昧樂乃至為賢聖善無漏法樂現前而住則無復妄想矣此謂非剎那者大慧善不善者謂八識何等為八謂如來藏名識藏如來藏識藏其實一也以其未墮名相則曰如來藏以其墮於名相則號為識藏故曰名識藏不壞身生亦生亦滅乃至形相差別攝受不壞身猶真識也隨順意識而生生已還滅若不覺自心所現則次第滅時別識生起取於種種形相差別意識五識乃至剎那時不住名為剎那謂念念不住故名剎那大慧剎那者乃至識習氣剎那剎那壞者識習氣也如來藏與意俱生乃有剎那壞相無漏習氣非剎那乃至以斷見壞無為法凡愚計著一切諸法剎那變壞而不能知一切諸法有是剎那非剎那故乃計無為同諸法壞是墮斷見故曰以斷見壞無為法大慧七識不流轉不受苦樂非涅槃因七識剎那變壞不與生死俱轉故云不流轉不受苦樂唯如來藏生死流轉故受苦樂為涅槃因大慧如來藏者受苦樂與因俱乃至妄想薰心凡愚不能了知如來之藏起剎那見故為妄想所薰復次大慧如金金剛佛舍利乃至而聖未曾不聖無間有剎那謂剎那非剎那者若得無間有剎那則雖聖之名亦不免於名相故亦壞聖亦壞而湛然者不期於存而獨存是乃所以聖故曰未曾不聖如金剛雖經劫數稱量不滅以剎那本無所成亦無所壞若得無間有剎那則無復剎那不剎那見故如金剛等何成壞之足云云何愚夫不善於我隱覆之說於內外一切法作剎那想佛說剎那所以息煩亂而凡愚無知作剎那想頌曰堪嘆誰知壞剎那若還計著又成魔剎那一切皆云壞借問真空壞得麼三種波羅蜜差別分第六十九佛告大慧波羅蜜有三種分別乃至為種種受生處欲邀福於來世故行波羅蜜凡夫神通及生梵天貪於色等境界而欲成就神通生於梵天非善於六度者也出世間波羅蜜者乃至樂自己涅槃樂不覺自心所現作涅槃想而攝受之故以行六波羅為樂出世間上上波羅蜜者乃至不生妄想覺自心現妄想則知攝與所攝及自心與妄想皆是二法以覺此故不生妄想於諸趣攝受非分悉無諸趣攝受故曰非分自心色相不計著聲聞緣覺雖能滅外色相而計著自心之色相若前之自己涅槃樂是也至此則不然矣安樂一切衆生故生檀波羅蜜起上上方便為安樂衆生而起最上方便此善於布施也即於彼緣妄想不生戒是尸波羅蜜即諸境界不起妄想則無去取離著之見此善於持戒也即彼妄不生乃至是羼提波羅蜜即於不起妄想忍知能攝所攝自性此善於忍辱也初中後夜精勤方便乃至是毗梨耶波羅蜜隨順如實修行於修行方便亦不起方便之想此善於精進也妄想悉滅乃至是禪波羅蜜聲聞有涅槃想故有攝受非此始名禪定自心妄想非性覺自心妄想皆非有性故曰非性智慧觀蜜乃至先身轉勝而不可壞轉先身而即勝如金剛之不可壞物生則有滅不為愚者說愚者不曉剎那義而作想以從彼生故不如實因生謂非因實降而生於不實色等視之苦真實一切色相無非實際頌曰世俗波羅樂色聲聲緣攝受涅槃城自心覺了方為上六度從茲絶想情如來說法離諸過差別分第七十爾時大慧菩薩復白佛言世尊世尊記阿羅漢記謂受記為令離聲聞乘進向大乘授聲聞言無上正覺凡以誘進也化佛授聲聞記乃至聲聞緣覺諸佛如來煩惱障斷解脫一味只解脫煩惱一味爾非智障斷聲緣煩惱障斷與如來同智障不斷與如來異大慧智障者見法無我殊勝清淨智障要見法無我性乃得清淨是智障斷也煩惱障者先習見人無我斷七識滅謂先所習人無我見至此而斷然後意識捨離是煩惱障斷也法障解脫識藏習滅究竟清淨煩惱障斷止於七識滅爾至於法障解脫然後識藏習滅故曰究竟清淨此已下說諸佛如來因本住法故前後非性本住法即常住真心前云如樹木心是也一切圓融前後皆非有性無盡本願故如來無慮無察而演說法以本願無盡故不忘演說然所以演說實出於無慮無察正智所化故念不妄故無慮無察所以化人出自正智實無妄念故凡所演說無慮無察四住地無明住地乃至覺人法無我及二障斷以無明習氣斷故方斷二煩惱乃至二障斷化佛者非佛不離佛因陶家輪等衆生所作相而說法如陶家輪造出百千器類皆因衆生所作之相此化佛說法也非自通處說自覺境界既曰化佛故云非自通處復次大慧愚夫依七識身滅起斷見不覺識藏故起常見愚夫以七識身滅而謂一切斷滅故起斷見不覺識藏本無所有執以為真常之法故起常見自妄想故乃至四住地無明住地自妄想之慧滅乃能解脫無明習氣斷故一切過斷爾時世尊欲重宣此義而說偈言諸乘非為乘彼則非涅槃智者乘無乘及涅槃欲色有及見欲界色界三有及見或作涅槃見而為說常住此皆因衆生而說一切法頌曰大慈金口何曾失誘進聲緣故佛同已了妄緣冥慮察不忘本願演宗風藏心輪轉非無漏化佛因他豈自通若識如來真境界逈離根量等虗空戒飲食分第七十一爾時大慧菩薩以偈問言智慧富貴家斯由不食肉頌曰如來不食度群倫況嗜腥羶染穢人祕典一時都禁斷修行從此得通津總頌曰如來只為閔癡盲豈憚相將入草行紙筆跡中傳了義𮌎喉響裏演無生也知明月元非指要覔真金不免烹若問楞伽端的意舉頭擬議八千程楞伽後序世疑達磨西來不立文字以楞伽祕典為非達磨所傳乃魏流支文妄嗚呼是未嘗知祖意面壁九年杜絶言句門人得髓不容以聲此西來之旨也奈何後學智劣世遠師訛無所折正學者必待揚眉拭眥而盡得之則達磨之教得其傳者幾希矣是故我祖不免取上乘一心之典併以傳授且曰吾有楞伽四卷是佛之心印使法亡而典存上根利器者可由此而證道傳訛習異者亦可由此而折正雖歷百千世而宗風不墜者其有賴於斯乎馬祖嘗曰達磨自天竺來傳上乘一心之法引楞伽經以佛語心為宗以無門為法門其言著在方𠕋以達磨授經之言為非則馬祖亦誣人矣夫馬祖師讓讓師六祖其言必有師承使楞伽果出於流支之僞濫胡不折正於馬祖獨於數百歲而下折正於人乎流支之說果何經據而云以傳燈為出於景德之後今為此說者果出於景德之前乎若以二祖非人勿傳之說為非是未嘗知先聖有醍醐上味翻為毒藥之語也今楞伽無傳則已其文具存試取而讀之有一言違先聖之旨乎但恐其句讀之難非粗心者所能分別也去聖時遙邪說增熾斯典備存尚不知取而讀之以為之折正況欲盡毀棄以為非達磨所傳復如何哉以為吾宗不立文字一切斷滅之則三祖之信心銘四祖之禪宗論六祖之壇經皆數千言盡可焚置而靈山所付特可委之迦葉又何用阿難區區為之結集殊不知面壁得髓之說乃達磨之拈花也楞伽四卷乃達磨之一大藏教也聖人立法自有權實安可執一而論夫以八識二無我五法三自性語楞伽之一二則可矣究楞伽之意故有盡竹帛所不能載者此達磨所謂可惜後人以為名相去在正今日之弊也吾將纂述斯典為之詮釋使文順而義明冀學者易於觀覽以大闡揚達磨之宗使有見聞者槩可成佛遽得此說誠可駭嘆因以為之辨云太姥野人楊彥國序楊居士楞伽經纂後序昔馬祖謂楞伽以佛語心為宗以無門為法門居士楊公謂以心為宗則心外無宗以無門為法門則有門非法此楞伽之指要也其所發明事相專論五法三自性八識二無我故又名聖智事分別自性經又名觀察五法自性相經又名言說妄想相心經居士謂心本無名以現得名故云言說妄想相心此佛語心之大意也云佛語心者以其始終所論不離妄想以至論倒不倒妄想起聖凡種性雖聖種性亦由不顛倒妄想而起名為妄想其實自心現量大哉心量雖十方虗空山河大地不出其中修行者乃欲滅除妄想而求真諦殊不知心之有想猶海之有浪欲捨浪而觀海亦猶捨煩惱而求菩提捨惑亂而求戒定其可得乎由此觀之唯能知妄想之可以凡可以聖然後可與論楞伽大旨嗚呼身心世界居妄想中不自知覺乃欲滅想求真去道愈遠此佛所以特假海浪以諭大慧至於大慧問不實妄想云何而生則曰種種義種種不實妄想論妄想生滅則曰聖賢如性自性妄想亦不異以至反覆詰難則告之曰前聖所知轉相傳授妄想無性獨一靜處自覺觀察離見妄想其告之深切著明如此故居士嘆言迷此則生死河悟此則涅槃樂其有得於斯歟後之學者假此微言求自覺悟當如此經所指獨依於義不依於文要在默契幽深回光返照則楞伽印心之說當自得於言說思惟之表若或執此經文以求心要是猶刻舟求劒其蹉過遠矣昔慧滿嘗云諸佛說心令知心相是虗妄今乃重加心相又增議論深違佛旨斯可謂善觀楞伽者也此經雖以五法等事相為主論然皆隨而排遣未嘗泥於一法自非深明義趣已捨筌蹄其能不滯於言說文字間乎居士福州長溪人家于瀲浦余建炎間作邑長溪時居士已去世三十餘年矣聞有是經纂特趨瀲浦謁其弟惇禮察院得其所藏之本察院公其言居士自少為學有雋聲一舉不第便有遁世之意去參諸方深造禪理既而結茅太姥之下遍閲內典獨於楞伽自有所得若夙緣所契研窮咀味凡數十年乃作此論臨終戒其子以親書副本藏諸柩仍建小塔于大姥左峰之巔以淨本置其中歲久塔頂夜有光村人疑有物遂窮之唯有文字四秩由是散失民間察院公宦游既歸乃復求訪得之觀其分章作偈顧雖諸禪老宿皆瞪視而不敢眦睨非大手筆其誰能之名經纂者以明其非注釋云耳紹興二十八年十一月初九日左太中大夫充敷文閣待制知福州軍州事提舉學事兼管內勸農使充福建路安撫使馬步軍都總管歸安縣開國男食邑三百戶賜紫金魚袋沈調記
