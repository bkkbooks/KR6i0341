front:
  text: 楞伽經纂序洪惟此道不容以聲靈山破顏而法已傳少林面壁而意默示惟授心要不立言文俾之眉宇相得而大道無餘針艾不施而沉痾頓釋奈何學者膠於曩昔之業習搖於知見之風波菴摩漸熟者不無日輪頓照者或寡月氛俱現金礦混殽遂使妙明每多塵翳而況世久而傳必謬師多而習必訛不載之書何以示證於是我祖爰自西來指出祕文併以傳授將使世替而法愈固人訛而文尚存但有志於披砂亦何艱於得寶我祖達磨嘗曰吾有楞伽四卷是諸佛之心印付之二祖祝俾護持傳之老師歷代稱讚蓋取大乘之器授之上味之珍咸滌細微愆置彼真淨地只為竺廣異壤文語殊音覽者彌旬困於句讀安能披文見義了然得於心胸哉深嘆覺皇妙旨因循與蠧俱捐想惟諸聖之寒心豈有仁人而坐視愚嘗於此精誠嚮慕意義潛通繼披尋大理昭晣深嘆前文僻古遂令後學輟觀於是纂敘玄樞為之詮注方啓琅函祕典蠲日施功果然金飾婦人中宵見夢強鞭不敏鄙頌兼成願階學徒目觀心了朞年之久四軸已周不敢與正經竝行但號曰楞伽經纂遂以百八句義列為七十餘門撮彼玄機隨為標目使學者披文得義以義證心非特佛印可傳抑使雄文不墜噫衆生昏昧習業纏綿不知自擲家財終日為他運糞性識飄忽老死奔馳乃至埋沒四生輪回六趣間有上乘之士難逃邊見之塵泯心相於斷空者不知其反溺於無認靈識之幻塵者不知其反墮於有無為大道寧落識塵擬議迷源澄神愈動靈光相續影裏藏身默坐觀空窟中活計況乃見聞覺識認作真如那將文字語言師為密旨但得靈源返本何虞諸法不真故我能仁大垂方便闡一心之妙杜諸見之邪必欲醇酌醍醐待將普灌窮子以出世慧入凡夫心指擲瑕玭洗除垢染七性七義鍛鍊真心三相四禪簡除情識立四小果以排空想述五無間以袪妄緣念所證之未圓遂分十地究諸法之無相乃示七空三智三身而俾之同歸法身二法五法而俾之共底如法只為情存見量誰知失在錙銖因示離想之混槃乃顯無我之識藏斷妄絲而不令相續俾寶印而使佩真空滅有非有情超性非性覺將欲為後來絶情見之寶開自覺之場冀礦石都捐即真金遍體而乃關防位前之岐徑點檢地上之瘢痕刮削透金塵發明隔羅膜咸使二障頓盡無乘可登永脫世世垢衣坐進如如妙地是故寶藏垂標而獨謂之心品江西稱讚而嘗嘆其無門謂之心品則心外無宗謂之無門則有門離法仰斯妙旨實有真歸寶貨森陳只求大價醫方紛委曲為微痾大價得而諸貨可捐微痾除而群方何用先佛授受唯是一心祕典密嚴只除心病真識空寂緣妄情生空寂還源情塵自泯即此真識廓爾無依心境俱忘緣續永離是謂正智豈有他求探得元珠不出家中舊物抉除翳眼自然空裏無花水非別體而一任成波鑑無自心而何妨照物上佛密意千聖同歸楮毫可殫稱讚莫盡此愚所以不辭爝火以助日光普願有情同居無漏太姥居人楊彥國序楞伽經纂目次序卷第一一切佛語心品第一指明真相分第一了妄明真分第二澄識明心分第三超乘證幻分第四有無俱遣分第五漸淨即頓分第六離二種聲聞分第七常不思議差別分第八生死涅槃差別分第九一切法不生差別分第十五無間種性差別分第十一一闡提差別分第十二三自性差別分第十三觀二無我分第十四離建立誹謗分第十五隨類普現分第十六空離自性分第十七離言即義分第十八卷第二一切佛語心品第二無我如來藏分第十九修行大方便分第二十離緣因俱漸分第二十一離言說妄想分第二十二淨離四句分第二十三禪差別分第二十四涅槃差別分第二十五離言事自性分第二十六如來神力建立分第二十七因緣言說差別分第二十八離惑亂見分第二十九如幻差別分第三十離名句形身分第三十一離相止惑分第三十二離四果差別分第三十三二種覺分第三十四離四大造色分第三十五諸陰自性相分第三十六離四種涅槃差別分第三十七離妄想自性差別分第三十八自覺一乘相分第三十九卷第三一切佛語心品第三意生身分第四十離五無間分第四十一佛知覺分第四十二佛等一切分第四十三自得本住分第四十四離有無有相分第四十五宗說俱通相分第四十六離不實妄相分第四十七離語義妄想分第四十八祛別智識相分第四十九離外道轉變見分第五十解脫相續相分第五十一了妄即空分第五十二壞諸法不生宗分第五十三離智即心分第五十四如來說宗俱通相分第五十五離世論分第五十六離涅槃相分第五十七卷第四一切佛語心品第四離一切根量分第五十八不生不滅離言說分第五十九祛外道不生不滅分第六十祛外道七無常見分第六十一超諸地相分第六十二滅諸地而證圓覺分第六十三離常無常分第六十四滅識即藏分第六十五五法三自性二無我分別相分第六十六優曇恆沙譬喻分第六十七剎那壞相差別分第六十八三種波羅蜜差別分第六十九如來說法離諸過差別分第七十戒飲食分第七十一跋楞伽經纂目次終
