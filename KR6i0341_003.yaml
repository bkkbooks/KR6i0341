body:
  text: 一切佛語心品第三意生身分第四十爾時世尊告大慧菩薩言意生身分別通相我今當說乃至修行者了知初地上增進相得三種身心本無相孰名以身自其所得之受用而生猶如意生無有障礙故曰意生身得三種身者進於初地故曰了知初地增進相知自心現境界性非性知所現之性皆非其性身心轉變謂轉捨心意意識五法自性二無我相身得如幻三昧乃至迅疾如意本一法界成現百千三昧清淨蠲潔明如妙華隨心化現故曰迅疾如意前言實相所現此言照諸幻相猶如幻夢水月鏡像乃至通達自性法故以能通達一切法皆彼自性而吾無性故曰自性法若是則雖現一切法而法常無染云何種類俱生無行作意生身乃至無行作意生意生身即一心而普造則萬法齊彰如海印像故曰種類俱生即一心而隨緣則無作而作如風過空故曰無行作種種意生身自在華莊嚴頌曰豁達已除諸識浪遂於三種現身財安然初覺元非性如幻徐知法障開功德海中騰雨露莊嚴門裏結樓臺須知無作而俱作一切皆從自得來離五無間分第四十一爾時大慧菩薩白佛言世尊如世尊說若男子女人行五無間業乃至名五無間事亦名無間等華嚴經云菩薩觀諸緣起自性空得空解脫觀諸有支性滅無有少法相生得無相解脫無相無願唯除慈悲得無願解脫此名三解脫謂行五無間者其意欲以三解脫及無漏想斷彼七識佛其實未能解脫故曰惡想復次大慧有外無間乃至於三解脫一一不得無間等法斷此五種名無間等斷之者是有心於善業者也若於三解脫中不見有無間等法除此已餘化神力現無間等化現無間則非究竟斷彼故曰外無間唯化現無間是則以智慧方便而行無間非有心於善業故能為作五無間罪者除疑悔也謂聲聞化神力乃至無有一向作無間事神力化現現已還滅非究竟斷彼故曰無有一向作無間事不得無間等除覺自心現量化現無間即於無間等法實無所有唯覺自心現量而自心現量之性本亦非性故下文云云離身財妄想乃至解脫餘趣相續妄想化現無間本以智慧方便而為衆生若有餘趣相續之想則亦未超心量故云是謂五無間不入無擇獄頌曰五般無間最為精正眼觀來是業生爭似無心三解脫不須防檢自圓成佛知覺分第四十二佛告大慧覺人法無我覺人法無我則無復有無我之相矣善知二無我二障煩惱斷永離二種死是名佛知覺頌曰皆言人法兼無我子細尋思了得麼只這二邊無取捨如來知覺沒殽訛佛等一切分第四十三佛告大慧以四等故等謂與之齊等無有分別於大衆中唱如是言字語身法既與諸佛無有差別則與諸受生一切種類皆悉平等無有同異達此然後知天地同根萬物一體迦葉拘留孫拘那含是我以此四種等我為佛子說頌曰衆生諸佛亦均齊大覺皆言我昔為若論四般無異等即同於彼更何疑自得本住分第四十四何因說言不說是佛說大慧言正覺即佛也而云不說是佛說故疑云何二法謂緣自得法及本住法自覺而不從外得曰自得萬變而法界如然曰本住離言說妄想離字二趣離言及字故曰二趣於其中間不說一字亦不已說當說佛以自得及本住法故離言字二趣一切所說對病設藥如鏡現像悉無所得亦無增減緣自得法住故我作是說彼佛及與我悉無有差別頌曰圓明妙體絶思惟若墮三乘豈易知自得樂中離所說真常法界弗曾移衆生有病根根別我佛施方種種醫若信古今無異體不談一字更何疑離有無有相分第四十五佛告大慧此世間依二種乃至欲見不離離相依於有無即墮性及非性而欲見可離及不可離相以不知心量故云何世間依有謂有世間因緣生本來寂滅凡說有者皆因緣故非不有從有生非無有生此世間說有者彼如是說者是說世間無因有無常相因故說有者為無之因大慧白佛言乃至後不復取此皆論愚夫依無也彼諸愚夫受貪恚已又計非性其意不取有性者謂彼自寂靜故又謂諸佛聲緣亦不取彼有無之性一切斷滅殊不知其不了自心現量反墮壞滅之想此所以言懷也佛告大慧善哉善哉乃至於聲聞緣覺及佛亦是壞者此難辭也如來謂若以貪恚癡為壞滅前言聲緣及佛亦可謂壞蓋貪恚癡與佛聲緣同歸於內外不可得故佛聲聞緣覺自性解脫故縛與縛因非性故佛及聲緣既見本性而得解脫於縛與因皆本無性大慧若有縛者乃至是名無有相若以貪恚癡為我之縛而欲壞去即是有縛者反為縛因念念壞去以為非性是墮斷見故曰是名無有相誰集因緣有非因於他自心緣起觀世悉空寂有無二俱離頌曰休說有無皆已離因緣生滅又沉淪若能悟了惟心境一似醒來看醉人宗說俱通相分第四十六大慧宗通者謂緣自得勝進相反照自心曰自得超離緣妄曰勝進遠離言說文字妄想乃至遠離一切虗妄覺想非見自心曰覺想如應說法如響之應曰如應云何起妄想非性為解脫何起非性以為解脫從愛生諸陰有皆如夢幻頌曰光明自覺證宗風方便隨機說亦通此是如來真淨境有無覺想悉皆空離不實妄想分第四十七世尊第一義亦如是離量限分譬因相第一義相無數無形無際無可喻無可因故曰離量限分譬因相將無世尊說邪因論耶說一生一不生大慧假問謂外義亦離性相與第一義同為計著或言妄想生或言妄想不生何為而異耶佛告大慧非妄想一生一不生乃至妄想不生謂有無之想本自不生外現之性本自非性覺自心現則一切唯心妄不期滅頌曰圓明法界絶虗凝萬種皆因外假成若覺惟心無別物不袪妄想自無生大慧我說餘愚夫自心種種妄想相故乃至如來自覺境界離五法自性事見妄想至此又拂五法自性之迹一切緣所作所作非自有所作皆緣於心事不自生事有二事過故謂有緣及所緣種種意生身我說為心量頌曰若到如來自覺境逈然無古亦無今真常玄旨猶無見妄想情塵何處尋離語義妄想分第四十八如緣言說義計著墮建立及誹謗見彼不生不滅等當無所緣而自證異建立異妄想如幻種種妄想現見一切法各別異相而起妄想謂如種種幻相故曰異建立異妄想譬如種種幻乃至非聖賢也佛言如幻但言其速滅爾非為其別異而起如幻之想也以彼建立故緣彼言說而建立不實如彼見亦非無所有謂一切無性無有者亦不實之斷見頌曰緣他言義立宗風異此同歸妄想中情識茫茫無實見不知何處覔真空袪別智識相分第四十九無事方便自性相是智本無所事一切方便還他自性復次得相是識不得相是智諸識寂滅心境俱忘了無所得故曰不得自得聖智境界不出不入故如水中月自得境界實相如如不見去來如水中月是謂聖智逮得自在力是則名為慧不採為智至此乃慧縛境界為心心未離緣不免於縛覺想生為智無所有及勝慧則從是生覺想為智至此乃慧遠離思惟想言慧如此二乘不相應以思惟攝受故不相應超度諸心量如來智清淨頌曰開標智識示群生只為凡愚眼未明三智立名皆是妄二乘非性亦非精如來地上超心量佛子須知絶想情自得界中無出入還如月湛水中形離外道轉變見分第五十復次大慧外道有九種轉變論外道轉變見生謂之轉變即有見相所謂形處轉變乃至是名九種轉變見今而非昔故曰轉變乃至事變妄想彼非如非異妄想故非有如是非不如是皆心現妄想自心現外性非性彼不知自心所現外性本非性大慧如是凡愚衆生乃至如見幻夢色生如實真心本無生滅有無轉變外道妄習如彼幻夢遽生色相一切非實然世間緣起如乾闥婆城頌曰法身常住不遷移轉變皆因性相迷萬法縱橫如幻夢覺來無物可思惟解脫相續相分第五十一爾時大慧菩薩復白佛言世尊乃至不墮如所說義計著相續一切諸法本來空寂蓋因言說文字計著其義故云四大於一切地乃至見一切法如幻夢等內觀四大悉離妄想外觀諸法一切如幻復次大慧覺外性非性自心現相無所有菩薩當覺外性非本有性惟自心現本亦無有隨順觀察自心現量乃至於一切法無相續不相續相以見分別有無故名相續以見諸法寂靜故名不相續菩薩於此悉無是相復次大慧彼中無有若縛若解乃至無衆生可得故有縛有解是衆生計著有無然有無畢竟無衆生可得復次大慧愚夫有三相續謂貪恚癡及愛未來有喜愛俱未來愛俱所以相續愚夫妄想縛相續不觀察頌曰真空無相沒鬖髿相續還能綴得麼堪笑凡愚依妄想如蠶纏了復纏他了妄即空分第五十二大慧復白佛言如世尊所說乃至妄想彼彼性妄性非故曰彼彼非有彼自性但妄想自性耳謂非本來有性但自己妄想所成故曰妄想自性爾世尊若但妄想自性乃至一切法妄想自性非性故大慧謂以一切性為妄想自性則必以性自性為非矣故曰非性自性相待若是則是以煩惱清淨一切無性為過而世尊所說不然蓋謂一切妄想皆自心現非本有性佛告大慧如是如是乃至性自性妄想真實惟覺自心現性則一切如幻非如愚夫執以為真實此妄想自性非有性自性然聖所以不執為真實以其本非有性但自心現性相而然爾大慧如聖智有性自性乃至如是性自性知言妄想之性自性而不執著亦如聖知聖見之性自性所知大慧白佛言若使如聖乃至非如愚夫妄想此假問也聖亦不有天眼肉眼之分別但知性自性而已不同愚夫分別妄想云何愚夫離是妄想不覺聖性事故大慧謂愚夫以不覺聖性事亦同諸聖之離妄想也世尊彼示非顛倒非不顛乃至不見離有無相故大慧謂聖以不見愚妄想為得而愚亦不見聖知見何為而不得世尊聖亦不如是乃至不以自相境界為境界故聖亦不如愚夫之見於外妄想一切如之自己境界未嘗自認世尊彼亦性自性相乃至謂墮性相見故彼謂愚夫畢境界非如彼等如是無窮過不覺性自性相故自大慧白佛已下其意謂聖雖非如愚夫妄想然亦有聖知等性自性愚夫雖不離妄想然亦又離聖性妄想聖離有無相愚夫又不見離有無相聖亦不見事妄想不執自境界愚任妄想自性而不說因無因謂愚墮性相見而聖之異境界非如彼愚妄想無窮然亦不覺性自性相皆大慧反覆詰問之辭世尊亦非妄想自性相乃至如實知妄想聖亦非妄想而因性自性云何愚夫妄想自見非為妄想亦如佛之實知妄想世尊妄想異乃至而愚夫不如實知聖凡若妄想異則自性異今也凡聖異者以聖能因妄想自性相故然聖因性凡亦非妄想則是各不妄想云何愚夫不如聖之實知也然為衆生乃至妄想相不如實有以愚夫不如實知故為衆生離妄想而說如謂彼妄想相不如聖之實有即是墮有見述在下文世尊何故遮衆生乃至而說聖智自性事蓋云佛遮衆生有無自性計著而聖智境界計者反墮有見佛既說空法及非性而又說有見聖智自性事耶佛告大慧非我說空非性乃至大慧我不說性自性佛為聖智事計著自性相見方說空法若有性自性見即墮有相故曰我不說性自性所說皆為衆生故此又拂前性自性之迹大慧但我住自得乃至離自心現性非性見若以自心現性皆本有性是著有也以為非性又著無也惟佛離此故得如實空法及如實印所印也得三解脫如實印所印乃至離有無事見相佛言性自性蓋欲衆生觀察妄念不離本心若執此相即墮有無當於自覺離諸有無頌曰如實真空佛所安還如用印一般般須知無住方為住要識如來住也難壞諸法不生宗分第五十三復次大慧一切法不生者乃至謂宗一切性非性故謂法不生則是於一切性有非性之見及彼因生相故因有生對方立不生之宗立一切法不生宗者彼說則壞不壞真相本自不生今乃建立是宗而入一切法則彼建立何為不壞大慧有無不生宗乃至展轉因異相故立一切不生宗外道五分論也謂之不生是對異相而立名若自相即無生與不生之見及為作故不應立宗分本來寂滅今又言一切不生則有作病故不應立宗謂一切法不生乃至現不現故及見覺過故謂一切法如幻夢之不實以明其現而未嘗現則是現出不現之相故曰現不現相故一切不實覺而後滅則不免覺想之過故但云幻夢則是倐有還無不待覺而自滅故曰見覺過故蓋言菩薩當說如幻夢不當說一切法不生當說一切法如幻夢性除為愚夫離恐怖句故愚夫怖其著有墮空而離大乘之智故佛說無生以袪其惑無自性無說無事無相續此皆愚夫不生之見彼愚夫妄想如死尸惡覺如死尸之不能變動此為惡覺一切法不生非彼外道宗外道不達其本至竟無所生性緣所成就不生之說緣想所成施設於三有無有事自性雖有施設其體本空施設事自性思惟起妄想若有自性是思惟想若能壞彼者心則平等見頌曰萬法如空自不生有無實理復何曾若於此說留宗旨飲藥誰知病轉增離智即心分第五十四爾時大慧菩薩復白佛言世尊如世尊說如攀緣事智慧不得是施設建立於攀緣事無所用智如之而已故曰如攀緣事若不因施設亦不說攀緣也施設所攝受非性乃至唯施設名耳用智照以息攀緣則智生如攀緣而不與之分別則智滅故曰智慧不得以是故凡施設建立皆無攝受性而一切如幻故於施設惟名存耳會爾炎故名為智爾炎識會故名為智佛告大慧不如是無智應是智非非智萬法如如不開智眼乃為大智此破大慧無智及非智之疑我不如是隱覆說乃至有無有外性非性知而事不得但覺自心現量則一切有無及性非性之所知皆非所知也故曰事不得不得故乃至智亦不得雖順三解脫而智亦不自知其所順經凡言智不得皆然非妄想者乃至作如是知此智不得非如妄想者習無始虗僞立為知見如此是知彼不知故是知乃智者所不知故云於外事處所相性無性妄想不斷妄想計其有性無性自心現量建立乃至依於斷見昧者以有智而起妄故於外性非性莫之有得乃謂一切皆空此斷見也而實有爾炎是亦說邪智頌曰如所攀緣隨建立勿開智眼見紛紜但知一切惟心現萬里秋空絶點雲如來說宗俱通相分第五十五復次大慧愚癡凡夫無始虗僞乃至來世凡夫聲聞緣覺不得其短一有所蔽則得以短之佛告大慧三世如來乃至為說種種衆具契經秦曰契今曰經說者授童蒙宗為修行者頌曰為對衆生有說言誰知說裏絶蹄筌宗通更了諸心識逈若虗空不立玄離世論分第五十六要壞帝釋千輻之輪隨我不如斷一一頭以謝所屈彼謂欲使隨於我我或不如即斷頭以謝當破壞結集結集謂藏教自事計著者但於自事而有計著自心現處二邊妄想所不能轉於自心所現不墮有無二邊相境非性覺自心現則自心現妄想不生覺一切法自心所現則能知他妄想來處故妄想無從而生一切剎那耶剎那梵語一念我諸根義三合智生謂知三緣和合而生者此外道見復次大慧爾時乃至有三有耶三有即三界也乃至意流妄計外塵皆是世論謂意之流注計著外塵以於外性不實妄想虗僞計著故謂妄想不生外道於外性有所計著而不知自謂妄想不生受無因論則起常見外因壞因緣非性則起斷見以一切無因曰常緣於非性而墮空曰斷皆不免有生滅相不觀察二心能現所現曰二心去者事不現如鏡現像此世他世等斯皆世論通頌曰外道不明心量說妄將幻識詰真宗誰知眼裏元無病自起空花亂太空離涅槃想分第五十七如諸外道妄想涅槃非彼妄想隨順涅槃一切妄想隨順涅槃即真涅槃如種子壞妄想不生斯等於此作涅槃想此云妄想不生謂以不生為想者大慧非以見壞名為涅槃彼蓋壞滅諸見而即涅槃大慧或以從方至方乃至猶如風止從方至方謂無有異趣境界之想雖滅而想性不滅如風暫止或復以覺所覺見壞乃至作解脫想謂不起分別常無常見作解脫想以有想故不得解脫去來現在有性不壞乃至一切法壞作涅槃想不壞墮常壞即墮斷或見時是作者時節世間如是覺者作涅槃想凡有見時自謂有作時節凡夫覺此即墮斷見大慧如我所說涅槃者謂善覺知自心現量量有四種一現見二比知三譬喻四先勝相傳彼外道於四度量悉皆不成一切度量不見所成愚於真實不應攝受於真實相不自立知同於愚者亦無攝受棄捨彼己棄捨謂不著外性以至不應攝受等不識心及緣則起二妄想愚昧本心與緣為二事現而無現心無計著故如彼愚妄想萬法如如無所分別故如愚者三有惟妄想外義悉無有外義外境也妄想種種現外義皆以妄想而現凡愚不能了經經說妄想終不出於名若離於言語亦無有所說頌曰純真法界自圓成外道如何墮想情展轉只因生滅相漂沉還落斷常坑自心覺了非他物四句袪除更不萌清淨境中無所得涅槃惟有一虗名
