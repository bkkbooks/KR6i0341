body:
  text: 一切佛語心品第二無我如來藏分第十九爾時大慧菩薩白佛言世尊乃至轉三十二相入於一切衆生身中三十二相者如來之色相也如來藏者如來無相之真心也如來回轉三十二相而以無相之相入於一切衆生身中離於求那周遍不滅彼說有我求那依也外道亦謂有常作者離於所依與如來同未來現在菩薩不應作我見計著謂如來嘗說空無相等句雖不說如來藏而如來藏之說已在是矣若夫心見未捐妄立藏性則是空中捏怪𩕳上安頭認而有之我所立矣故如來貴乎無我愚夫無知見彼無我反生怖畏是故佛說如來藏欲不墮空故目無所有境界令不墮有故譬如陶家於一泥聚乃至入三解脫門境界希望華嚴謂菩薩觀緣起而知自性空得空解脫觀十二有支自性滅得無相解脫入空無願求唯為教化衆生故得無願解脫故曰三解脫爾時世尊欲重宣此義而說偈言人相續陰緣與微塵勝自在作心量妄想外道緣陰作微塵勝自在說皆是心量妄想頌曰寶藏圓明絶我情堪𠷣外道自營營不因大覺垂慈旨誰識純真沒現成途路弗曾為旅泊家山何用指歸程無依無住如來住休向如來住處行修行大方便分第二十爾時大慧菩薩觀未來衆生乃至三界種種色行繫縛身財建立妄想隨入現謂以色行建立身財隨入自心而現妄想是名菩薩摩訶薩善分別自心現云何善觀外性非性乃至作如是善觀外性非性以無始虗僞本來寂靜法皆自爾故曰自性謂如幻夢一切性自他俱性不生真源虗廓仗境而生境滅心亡一如幻夢何有生滅之可云隨入自心分齊故覺惟心現故曰隨入自心分齊見外性非性見識不生及緣不積聚非特見外性以為非性而此所見之識亦不生而緣亦不聚見妄想緣生於三界乃至見離自性生見悉滅所見無自性生而見亦無見故云知如幻等諸法自性乃至得離心意意識五法自性二無我相已上八地一切悉離若其餘地未足語此聖種類身一時俱生聖種類身謂後文一切佛法緣自得樂相是也猶如意生無有障礙乃至成就四法得修行者大方便當如是學為離心意意識五法自性二無我相已於寂滅中現出妙相無有障礙猶如意生此皆通達如幻三昧不滯於空乃能如此頌曰如來為愍衆沉淪指出修行四種因令見妄心惟自現了明外性悉非真境緣出沒皆如幻聖智縱橫不是塵從此廓然無障礙神通乃得意生身離緣因俱漸分第二十一爾時大慧菩薩復請世尊惟願為說一切諸法緣因之相萬法本空緣因而有是名外緣前後轉生緣外所作一切名相緣者雖在內所緣者實在外故曰外緣云何內緣乃至相現作現作如燈照色等作則有相無有間斷故曰無間相現謂妄想生已則一切相從心而現昭然可見待因者滅時作相續斷不妄想性生滅時謂妄想滅時凡斷妄亦妄想也待斷乃無故曰待因大慧彼自妄想相乃至不然但妄想耳真理廓然本無生滅及與相續蓋因設為相續方便滅已復生乃有是說此皆妄想因攀緣次第增上緣等生所生故漸次生不生漸次生非能生乃妄心之所生也妄想自性計著相故漸次俱不生漸次及俱皆本不生因妄自性而計著之自心現受用故自相共相外性非性妄想自性計著皆自心現身財而自共相皆是外性非本有性一切無所有斯皆是言說頌曰真相圓明絶芥塵休從妄想起緣因悉離漸次俱生見始作逍遙自在人離言說妄想分第二十二爾時大慧菩薩復白佛言世尊惟願為說言說妄想相心經此經上佛語心也則能通達言說所說二種義言說妄想皆心所現心本無名以現得名故曰言說妄想相心疾得阿耨乃至淨一切衆生見於聲音曰言說言說之事曰所說菩薩以此能淨衆生不著言說先所經境界隨憶念生從覺己境界無性生憶先所經與夫覺已而知無性以是而有言說彼悉如夢故曰夢言說過妄想計著乃至隨憶念生謂怨先所作業而憶持之以生過念為是而說無始妄想言說者乃至自種習氣生習氣積緣如自下種故曰自種佛告大慧言說妄想乃至謂彼因生相故謂有生相乃有言說若無生相言說亦亡茲所以不可言同異也大慧若言說妄想異者妄想不應是因因有妄想乃聲為言說云何有異若不異者語不顯義而有顯示不顯之義說能顯之云何無異謂第一義聖樂言說所入是第一義聖樂言說所入雖由言說而入而過於言說遠矣言說相不顯示第一義自相他相本來無性言說相者不過分別自他故不顯示第一義復次大慧隨入自心現量故乃至言說妄想不顯示第一義一切言說皆自心所現本無性故不示第一義自覺聖智子實際我所說頌曰言說皆因妄想情齒齗喉舌衆緣成若從聖智求言說打破鐘來覓響聲淨離四句分第二十三謂一異俱不俱有無非有非無常無常曰四句爾時大慧菩薩復白佛言世尊惟願為說離一異俱不俱乃至趣部分之相相行所現一切皆有部秩分數相行雖現各趣部分以如衆色現摩尼故隨建立誹謗以是惡見當隨地獄言遠離者當如是見而彼水泡非摩尼非非摩尼取不取故心所執取乃有是相如是外道惡見乃至緣有者言滅緣有著空又墮斷見復次大慧有三種量五分論乃至而作性妄想計著諸外道建立三種量五分論而自謂實得聖智離二自性事乃起有性妄想而計著之大慧心意意識身心轉變乃至不於彼作性非性想謂正修行者不於彼境界而作生及非性生若復修行者乃至得聖智自覺三昧樂住者分別顯示謂化佛說法為隨順凡夫所見令其修行非為建立如實修行及顯示聖智三昧樂境界復次大慧如來說法離如是四句乃至離於有無建立誹謗離是四者分別結集真諦乃至非自性相續而為說法如來說法以結集真諦為首非若外道性與自在及無因等而相續說復次大慧為淨煩惱爾炎障故乃至善分別諸乘及諸地相為淨衆生故建立百八句凡以善分別諸乘及地相爾其本實無有也頌曰衆生計著似狂酲四句依他妄想情一異俱緣隨處暗有無常見競頭爭摩尼垂髮元非性樹影風聲假彼成一切須知心鏡裏妍𡟎狀貌本無形禪差別分第二十四復次大慧有四種禪乃至前後轉進想不除滅謂於無常苦空不淨等相堅著不捨漸次增進至非想滅定云何觀察義禪乃至外道自他俱無性已於人無我相及於外道自他俱見彼皆觀察知無性已云何攀緣如禪謂妄想二無我妄想妄想分別也謂若分別無我有二即是尚有分別也如實處不生妄想若如實知則彼分別不復生矣如虗空火燼修行者觀察言顯幽明暗之不同如是種種相已下四句言三種禪一時摩其頂隨順入如相頌曰堪笑堪嗟不免疑禪那因此又支離愚夫作意袪除我觀察留心相義推如實攀緣懲妄想如來聖智絶思惟慈悲苦為衆生辨問著元來總不知涅槃差別分第二十五爾時大慧菩薩復白佛言世尊般涅槃者說何等法謂為涅槃佛告大慧乃至見習轉變名為涅槃已上七者有所轉變而即寂名為涅槃諸佛及我涅槃自性空事境界謂如來涅槃無所計著亦無所轉變無依無作一切成現所作境界悉空無事故曰空事境界言諸佛涅槃以明前者非也復次大慧涅槃者乃至不顛倒見妄想不生彼等於彼作涅槃覺頌曰諸佛慈悲為指蹤涅槃自性要通融斷常死壞皆無染藏意因緣已絶同堪笑二乘生覺想及袪顛倒墮塵籠如來路上無消息擾擾忩忩一鑑中離言事自性分第二十六復次大慧二種自性相乃至從不覺自心現分齊生頌曰胸喉唇舌發音聲萬事縱橫盡日營皆是妄緣空計著自心覺了即無生如來神力建立分第二十七復次大慧如來以二種神力乃至及手灌頂神力謂令入三昧然後為現神力大慧菩薩摩訶薩初菩薩地住佛神力謂初入菩薩地必依神力方入照明三昧如下云大慧復白佛言世尊以何因緣如來乃至佛告大慧為離魔業煩惱故謂令其離魔業煩惱等及不墮聲聞地禪故乃至則墮外道惡見妄想如來所加神力非由外至亦因無依無作法性而已故不墮外道見神力人中尊大願悉清淨三摩提灌頂初地及十地頌曰如來普照遍河沙魔業皆離絶等差菩薩盡承神力攝遂令端坐寶蓮華因緣言說差別分第二十八爾時大慧菩薩復白佛言世尊佛說緣起即是說因緣乃至然世尊所謂因緣生諸性言說因緣生諸性言說佛與外道其異否故云有間悉檀有間悉檀無間悉檀悉檀者譯義或言宗或言成就或言理也建立作如是說此有故彼有謂有無明乃有緣行故曰此有故彼有佛告大慧我非無因說乃至不覺自心現量外境界性非性謂於外境有性非性見彼有如是過乃至佛告大慧無性而作言說謂兔角龜毛等世間現言說無而現有乃世間言說大慧非性非非性但言說耳佛告以言說非有性亦非有非性如汝所說言不能如實知輪回三有宅頌曰因緣勿為從他起言說休論性有無若覺唯心或現境鏡明鐘響自如如離惑亂見分第二十九妄想為惑誰其不然凡夫迷悟昏不自知二乘悟迷認為顛倒昏不自知病不服藥認為顛倒飲藥增痾遂使真常無由旋復故如來為惑亂而說常祖師云迷生寂亂悟無好惡爾時大慧菩薩復白佛言世尊常聲者何事說謂聲言為常者以何事而說佛告大慧為惑亂執惑亂以為顛倒而生滅之心生茲所以役於取捨而不得常祖師曰良由取捨所以不如故大慧問常而佛答以為惑亂以彼惑亂諸聖亦現而非顛倒諸聖亦現惑亂與人同無倒與不倒覺想與人異非明智也然非不現謂之明智非如木石安得不現彼但如幻雖現不現所以者何謂離性非性故本來離性因妄而生一翳在目空華亂墜彼安能作無常哉云何離性非性惑亂謂一切愚夫種種境界故種種境界謂如不文恆河如彼恆河餓鬼見不見故無惑亂性餓鬼於河不見有水是無恆河之性如彼愚夫溺於惑亂不自知也於餘現故非無性餘具覺知見為恆河是有恆河之性如彼聲聞執為實有於惑亂性欲壞滅之如是惑亂諸聖離顛倒不顛倒是故惑亂常謂相相不壞故諸聖於惑亂非愚夫之無惑亂性而不自知亦非如二乘之有惑亂性而務欲壞滅故離倒與不倒之覺斯不期於常而自常矣所以常者以未嘗相相而務欲滅之故也故下文云云大慧云何惑亂真實乃至於此惑亂有少分想非聖智事相聖於惑亂已得如幻倒不倒見皆悉無有除此之外有少分覺即覺想也故曰非聖智事相大慧凡有者愚夫妄說非聖言說有者謂執惑亂性而有之此愚妄爾彼惑亂者倒不倒妄想起二種種性已下雖聖種性亦是不倒妄想也大慧即彼惑亂妄想起緣覺乘種性謂即彼惑亂自共相不親計著有緣而覺非不計著但有所覺而不親之爾云何智者即彼惑亂起佛乘種性謂覺自心現量外性非性不妄想相謂不於外性而起非性之想起佛乘種性是名即彼惑亂起佛乘種性雖曰佛乘以有心量故不免妄想若知如幻則佛乘亦妄爾又種種事性凡夫惑想起愚夫種性愚夫分別種種事性決定如是決定不異故曰惑想彼非有事非無事是名種性義聲緣聖凡皆即惑亂而起種性彼種性中種種事物非即是物亦非非物皆隨心而現故曰是名種性義大慧即彼惑亂不妄想乃至是故說如離心即惑亂之性而不妄想故諸聖能轉捨心意意識等習氣而為真如也說如離心者謂離心意意識等大慧白佛言世尊若惑亂如幻者復當與餘惑作因謂一切如幻前後轉生諸餘惑亂因此而起又大慧之疑也佛告大慧非幻惑因不起過故幻不起過無有妄想一切如幻諸過潛消過之能消以無諸妄大慧幻者從他明處生非妄想過習氣處生惟彼覺明乃能如幻是故不起過大慧此是愚夫心惑計著非聖賢也餘惑作因以是生疑是愚夫計非聖賢也爾時世尊欲重宣此義而說偈言聖不見惑亂中間亦無實中間若真實惑亂即真實捨離一切惑若有相生者是亦為惑亂不淨猶如翳若有離相亦惑亂也故曰不淨頌曰寂寂空凝絶較量妄疑惑亂敗真常却將覺想袪顛倒撓破無心佛道場影像不辭潭底現妍終豈鑑中藏但知一切皆如幻萬法紛紜掣電光如幻差別分第三十復次大慧非幻無有相似見一切法如幻大慧白佛言乃至言一切法如幻為異相計著種種謂一切相異相謂顛倒相變異不同猶如幻化此大慧之疑也若種種幻相計著乃至世尊有性不如幻者大慧謂既有性相即不遽滅安可計著如幻所以者何乃至種種相現如幻一切色相非因而然既無所因則種種相現自如幻爾大慧然不實一切法速滅如電是則如幻以法不實速滅如電故言如幻譬如電光乃至非愚夫現愚夫執著不能速滅故云如是一切性乃至非現色相計著謂於一切性相若能觀察無性乃如幻非於色相有所計著佛告大慧非我說無生如幻乃至謂生無生性體空寂凡有所生悉如幻夢故雖有生實未嘗生覺自心現量有非有外性非性無生現但覺自心有及非有外性非性皆無生現大慧非我前後說相違過乃至非自妄想種種計著緣外道從有無生一切法不說自心妄想執著因緣而生大慧我非有無有生乃至為攝受生死故說言人之有性為欲衆生知死生有去來非如斷滅之見壞無見斷見故乃至種種業受生處故謂有是業有是受生以性聲說攝受生死乃至為離性自性相故佛說如幻非有所立欲有所離故也隨愚夫惡見相希望乃至說幻夢自性相一切法愚夫惡見不知自心如來欲令破壞因緣計著之見故說幻夢為之對治不令愚夫惡見希望乃至如實處見作不正論法法如幻即無緣想亦無滅見遂令法相一切如實愚夫執著而以此說為不正論大慧如實處見一切法者謂超自心現量知心有現則心為現轉未能無心心如實處則心無自心法惟自法如鏡現像不將不迎心量之見亦將除滅爾時世尊欲重宣此義而說偈言無生作非性有性攝生死觀察如幻等於相不妄想頌曰世間萬法自形彰昧者依他盡日忙故說幻因明遽滅要同掣電暫時光無生為破愚夫執有性須知應病方儻若無心如實處曾無一物可思量離名句形身分第三十一復次大慧當說名句形身相乃至隨入義句形身假名顯道故覺名句即入義句疾得阿耨多羅乃至自性決定究竟是名句身事以名立名以句定句以顯義義有自性因自性故決定究竟形身者乃至是名形身形身者即字也又形身者謂長短高下乃至自相現故說形制字者長短高下像其本形故曰自相現是名名句形身乃至應當修學知名句形身即知所以言者在於言外而言者特筌蹄爾名身與句身及形身差別凡夫愚計著如象溺深泥頌曰形名章句亂紛然不免雞窗坐究研萬里江湖如到岸行人何用守空船離相止惑分第三十二復次大慧未來世智者乃至而言說無記止論無記猶無所記録謂不立說也止論謂置而不答也如來為彼衆生怖其著有故說言無記所以通之外道計著攝所攝性不知自心現量故止而不為說昧者不知佛之通義不在此而直以此稱佛蓋失之矣非彼癡人之所能知乃至於因作無記論若因於身命者是也故曰於因不知自心現量故止彼佛之止論為此而已如來應供等正覺以四種記論乃至不為熟者四種記論謂直答反質答分別答置答置答即止論也復次大慧一切法離所作乃至一切法不生以外道於因作無記論故佛說因緣不生及性相不可得大慧何故一切性離自性乃至說一切法不生自覺則一切性相皆無所得故一切法不生何故一切法不可持來乃至欲持去無所去無所攝受故無所來既無所來復何所去是故一切法離持來去乃至一切法不滅性自性相悉無所有法不可得又何所滅何故一切法無常乃至是故說一切法無常本來寂滅何有無常無常性者因於世間諸相起故何故一切法常乃至說一切法常謂一切相起本無生性既本無生無常常矣正覺所分別自性不可得以離於言說故說離自性頌曰外道愚癡義不通妄為止記混真空若論聖智無蹤跡性相皆離絶異同離四果差別分第三十三爾時大慧菩薩復白佛言世尊乃至以一切法境界無盡身財攝養一切一切法無盡身財即華嚴之行海是也佛告大慧有三種須陀洹乃至以彼非有非無非有無無實妄想相故須陀洹無愚夫想有無非有無及一切法皆無實想此之妄想亦如愚夫緣起自性種種計著而生妄想也愚夫妄想乃至是須陀洹妄想身見謂欲去愚夫妄想如此而不知反隨無實妄想妄想身見者以有人無我見大慧俱生者須陀身見乃至大種及色不集故謂須陀洹見自身它身色相本空雖曰遣色適長生相是乃俱生身見俱生身見者以有色不集等見須陀洹觀有無品不現乃至是名身見相觀有無一切不現方斷身見而不生貪大慧疑相者乃至是名疑相須陀洹斷謂疑法不生故曰疑相斷大慧戒取者云何乃至求受生彼則不取謂諸愚夫持戒精勤種種苦行求受生處饗未來樂彼須陀洹不取是相故曰不取戒除回向自覺勝乃至受持戒支唯於回向等受持戒支則雖取而不取也是名須陀洹戒相斷乃至墮身見及諸結不斷須陀洹若作是念此是三結我離三結者是名見二法反墮身見而所謂結斷者復不斷矣佛告大慧愛樂女人乃至非趣涅槃貪斷須陀洹果得正受樂故能斷世間貪非能斷趣涅槃貪大慧云何斯陀含相乃至見相不生照破色相及妄想生想於彼見相又皆不生善見禪趣相故乃至使妄想不生故於色相性以及非性而自生過患之見蓋彼於妄想使不生故為菩薩摩訶薩方便示現阿羅漢為佛化化以佛之化化導衆生曰化化一乘道果菩薩方便示現為佛化化此三種也佛告大慧得寂靜一乘道聲聞非餘者謂今所說阿羅漢乃一乘道非彼二種故於下文述二種行以明一乘其行不然大慧於妄想處種種說法乃至得果相說名得果禪者入禪一切遠離是謂得禪以見心現量是謂得果說名得果非實得果已上二種未超心量故非一乘復次大慧欲超禪無量無色界者乃至有心量故以前二種未離受想正受唯超自心現量者乃不復爾故曰不然凡以別二種有心量故自欲超禪無量無色界已下皆述寂靜一乘道也此則妄想量若覺得解脫頌曰諸佛真機不易傳過諸色量實難肩斷除三結高持戒頓照無生果已圓唯有那含能見過堪任羅漢得諸禪一乘除是超心量體合虗空不立玄二種覺分第三十四復次大慧有二種覺乃至是名觀察覺覺性自性亦無性見即無四句之可離故曰選擇離四句不可得大慧此四句離乃至觀察一切法應當修學覺性自性即離四句法自法爾於此始名為一切法離此四句觀察諸法始超四句而即自在故當修學大慧云何妄想相攝受計著建立覺乃至是名妄想相攝受計著建立覺計著四大種之所宗即自因相而生譬喻且曰彼皆不實之所建立計著於此是有建立本無所有有立皆妄又當覺此是名二種覺相乃至成就此二覺相善覺二種故曰成就人法無我相乃至得初地入百三昧無所有覺即能觀察行地方得初地入百三昧不旋踵間而超法雲言其速也善繫心十無盡句華嚴教中十無盡句成熟衆生乃至得自覺樂三昧正受頌曰觀察覺中離四句計他不實亦非真到頭無覺方為覺始作如來閫域人離四大造色分第三十五復次大慧菩薩摩訶薩當善四大造色云何菩薩善四大造色以有四大之性造出四大之色相彼真諦者四大不生真諦寂靜故云不生蓋無生想乃不生矣彼四大不生作如是觀察乃至是名心現妄想分齊於彼四大作不生觀乃能覺知妄想分齊悉由自心所現分齊而知外性率皆非性謂三界觀乃至離四句通淨菩薩於三界中觀四大造色之性本無所有離於四句通淨而無所染離我我所如實相自相分段造色已離四句即於實相自相一切如之初無生滅之想即相而言故說分段住無生自相成若住實相即住無生如此自相乃成大慧識者因樂種種跡境界故餘趣相續四大生色以諸根識樂於一切形跡境界其餘諸趣以是續生大慧地等四大及造色等乃至大種不生若覺無性四大種子亦無有生故云非彼四大緣性形相處乃至外道妄想非我頌曰地水火風名四大誰知和合衆緣成若知四大元無性自相如如總不生諸陰自性相分第三十六復次大慧當說諸陰自性相乃至而妄想言一虗空四大種性周遍法界然其色相猶可指陳若夫非色諸陰逈離數相如人妄言為一虗空也大慧如是陰乃至非聖賢也諸陰離相離性及離四句因迷而有覺後皆空愚夫妄執以為實有故曰非聖賢也大慧聖者乃至離異不異故聖者之於五陰倐有忽無如幻出種種色像又如幻夢影像未嘗計其同異故永嘉云五陰浮雲空去來大慧聖智趣乃至汝當除滅諸陰性相本來空寂皆因妄想而現聖智旨趣不墮有無同其妄想所現而無所著故云是名諸陰自性相汝當除滅滅已說寂靜法乃至法無我見淨法雖無我其見猶存見性兼忘乃真寂靜及入不動地乃至普濟衆生亦復如是頌曰五陰浮雲性本離還如夢影勿生疑法無我見仍虗淨空手廛中一幻師離四種涅槃差別分第三十七復次大慧諸外道有四種涅槃云何為四謂性自性非性涅槃謂不覺性自性而以為非性即涅槃者種種相性非性涅槃謂以一切性相皆為非性即涅槃者自相自性非性覺涅槃謂初以性相為非性今乃覺焉而實覺想於此即涅槃者諸陰自共相相續流注斷涅槃謂斷諸陰流注而即涅槃者是名諸外道四種涅槃乃至妄想識滅名為涅槃外道涅槃不離妄想識陰種子如來所言一切識滅名為涅槃非實有性大慧白佛言世尊乃至云何離意識非七識大慧謂既立八識何故於此但說意識滅而非七識滅也佛告大慧彼因及彼攀緣故七識不生因及攀緣初由意識若意識滅則七識無由而生意識者境界分段計著生乃至是故意識滅七識亦滅自境界分段計著至因緣生意識之所生也自不壞身相至亦如是七識之所生也習氣滋生長養藏識意與之俱計著我所而有思惟相續因緣乃生意識若夫不壞身相藏識則如來藏也藏識為之因攀緣所現而聚於心乃生七識七識即前所謂現識意識即前所謂分別事識不壞身相藏識即前所謂真識心之所現意識分別七識隨之意識滅盡無所攀緣七識空名故當自滅如是意識滅種種識不生頌曰妄想紛拏不自知却於心鏡現形儀遂令七識攀緣起留得諸塵意裏推境上根莖如不著靈源澄湛更何疑超然寶藏無形像對面知他是阿誰離妄想自性差別分第三十八復次大慧今當說妄想自性分別通相乃至謂有所說事自性聖智所知依彼而生言說妄想是名所說事妄想聖智所知了義妄說若依彼而生言說故名所說事妄想是名自性妄想本無所有妄立自性以為此法如是如是不異此意見也謂縛不縛因緣計著如士夫方便若縛若解謂執因能縛而有所縛如人以繩方便力故縛已復解大慧計著緣起而計著者乃至如幻示現種種之身計著緣起於妄自性而生計著如依於幻見種種物凡夫妄想見種種異幻凡夫以此轉執幻相心縛於境界覺想智隨轉隨境而覺謂之覺想無所有及勝平等智慧生妄想自性有已下皆妄立緣起之性世諦第一義以世諦及第一義為二第三無因生又立無生之說為三妄想說世諦斷於聖境界已上諸妄惟聖則斷譬如修行者於一種種現於一理而現種種究竟不成就則度諸妄想究竟而諸相不就則度矣自覺知爾炎彼無有差別唯自覺則知差別者皆爾炎也成已無有性謂成自性云何妄想覺至成自性則一切無性云何用覺妄想種種現清淨聖境界唯聖乃知雖現而非實離二妄想者如是則為成頌曰妄想皆因緣即起更論無有異兼同還如無裏重占夢覺後方知一切空自覺一乘相分第三十九大慧菩薩復白佛言世尊乃至離見妄想覺其不由於他因心而見於此心見又當遠離上上升進入如來地乃至及覺法無我煩惱習氣已斷又當覺法無我若不覺法無我則未能忘法如味著三昧樂及非性無漏界是也彼一切起煩惱乃至非性無漏界覺煩惱習氣雖斷而未能覺法無我方且味著三昧樂及非性無漏境界智者於此又當覺也觀察一切皆本非性而證無漏性相未忘故當覺也諸乘非究竟有心即墮三乘頌曰聖智無乘名自覺蓋言自照不由人味貪三昧皆為障無漏為心未免塵終被相風時鼓轉猶如浮木泛江津廓然覺性空中泯始得如來自在身
